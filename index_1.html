<script>(()=>{const{useState:f,useEffect:C,useRef:ie}=React,_=()=>(C(()=>{const p=document.createElement("link");p.href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap",p.rel="stylesheet",document.head.appendChild(p)},[]),null),re={whatIsChemo:["Ha most olvassa ezeket a sorokat, val\xF3sz\xEDn\u0171leg nemr\xE9g hallotta el\u0151sz\xF6r kezel\u0151orvos\xE1t\xF3l a kemoter\xE1pia sz\xF3t. Tudjuk, hogy ez a pillanat ijeszt\u0151 lehet. Szeretn\xE9nk, ha tudn\xE1: nem kell egyed\xFCl megk\xFCzdenie ezekkel az \xE9rz\xE9sekkel, \xE9s ez az oldal az\xE9rt k\xE9sz\xFClt, hogy v\xE9gigk\xEDs\xE9rje \xD6nt ezen az \xFAton.","A kemoter\xE1pia gy\xF3gyszeres kezel\xE9s, amelynek c\xE9lja a r\xE1kos sejtek elpuszt\xEDt\xE1sa vagy szaporod\xE1suk meg\xE1ll\xEDt\xE1sa. A gy\xF3gyszerek a v\xE9r\xE1rammal jutnak el a test minden r\xE9sz\xE9be, \xEDgy ott is k\xE9pesek hatni, ahov\xE1 a r\xE1kos sejtek esetleg m\xE1r eljutottak. Ez az egyik legnagyobb el\u0151nye m\xE1s kezel\xE9sekhez k\xE9pest.","Ez a ter\xFClet az elm\xFAlt \xE9vtizedekben \xF3ri\xE1si fejl\u0151d\xE9sen ment kereszt\xFCl. A mai kezel\xE9sek sokkal c\xE9lzottabbak, a mell\xE9khat\xE1sok pedig sokkal jobban kezelhet\u0151k, mint kor\xE1bban. Az orvosi csapat mindent megtesz az\xE9rt, hogy \xD6n a lehet\u0151 legkevesebb megterhel\xE9ssel jusson t\xFAl a kezel\xE9sen."],whyUsed:[["Gy\xF3gy\xEDt\xE1s","Sok r\xE1kt\xEDpusn\xE1l a kemoter\xE1pia teljes gy\xF3gyul\xE1st eredm\xE9nyezhet. Ilyenkor a c\xE9l az \xF6sszes r\xE1kos sejt elpuszt\xEDt\xE1sa."],["M\u0171t\xE9t el\u0151tti kezel\xE9s (neoadjuv\xE1ns)","A daganat m\xE9ret\xE9nek cs\xF6kkent\xE9se, hogy a m\u0171t\xE9t kisebb beavatkoz\xE1ssal is elv\xE9gezhet\u0151 legyen."],["M\u0171t\xE9t ut\xE1ni kezel\xE9s (adjuv\xE1ns)","A m\u0171t\xE9t ut\xE1n esetleg visszamaradt, szabad szemmel nem l\xE1that\xF3 sejtek elpuszt\xEDt\xE1sa. Ez jelent\u0151sen cs\xF6kkenti a ki\xFAjul\xE1s es\xE9ly\xE9t."],["T\xFCnetcs\xF6kkent\xE9s (palliat\xEDv)","El\u0151rehaladott betegs\xE9gben az \xE9letmin\u0151s\xE9g jav\xEDt\xE1sa, a t\xFCnetek enyh\xEDt\xE9se. Ez is nagyon \xE9rt\xE9kes c\xE9l."]],howKnow:["Term\xE9szetes, hogy szeretn\xE9 tudni: m\u0171k\xF6dik-e egy\xE1ltal\xE1n? Az orvosi csapat t\xF6bb m\xF3don is nyomon k\xF6veti a kezel\xE9s hat\xE9konys\xE1g\xE1t. \xC1ltal\xE1ban n\xE9h\xE1ny ciklus ut\xE1n kontrollvizsg\xE1latot v\xE9geznek (CT, MR vagy PET-CT), ami megmutatja, hogyan v\xE1ltozott a daganat m\xE9rete. Az \xD6n \xE1ltal\xE1nos \xE1llapota \xE9s a laboreredm\xE9nyek szint\xE9n sokat el\xE1rulnak.","Van valami, amit szeretn\xE9nk, ha megjegyezne: a mell\xE9khat\xE1sok er\u0151ss\xE9ge NEM jelzi a kezel\xE9s hat\xE9konys\xE1g\xE1t! Ha kevesebb mell\xE9khat\xE1sa van, az nem jelenti, hogy a gy\xF3gyszer nem hat. Az er\u0151s mell\xE9khat\xE1sok sem jelentik, hogy a kezel\xE9s jobban m\u0171k\xF6dik. Minden szervezet m\xE1sk\xE9pp reag\xE1l."],whyMany:"Sok beteg k\xE9rdezi: mi\xE9rt kell ennyif\xE9le gy\xF3gyszert kapnom? Az\xE9rt, mert a r\xE1k nem egyetlen betegs\xE9g, hanem t\xF6bb sz\xE1z k\xFCl\xF6nb\xF6z\u0151 t\xEDpus. A k\xFCl\xF6nf\xE9le gy\xF3gyszerek m\xE1s-m\xE1s m\xF3don t\xE1madj\xE1k a r\xE1kos sejteket: van, amelyik a DNS-\xFCket k\xE1ros\xEDtja, van, amelyik a sejtoszt\xF3d\xE1st akad\xE1lyozza, megint m\xE1sok az anyagcser\xE9j\xFCket zavarj\xE1k meg. Kombin\xE1lva sokszor hat\xE9konyabbak, mint b\xE1rmelyik\xFCk \xF6nmag\xE1ban.",howDecided:"Az \xD6n kezel\xE9si terv\xE9t az orvosi csapat gondos m\xE9rlegel\xE9s ut\xE1n \xE1ll\xEDtja \xF6ssze. Figyelembe veszik a r\xE1k pontos t\xEDpus\xE1t \xE9s alt\xEDpus\xE1t, a betegs\xE9g st\xE1dium\xE1t, az \xD6n \xE1ltal\xE1nos eg\xE9szs\xE9gi \xE1llapot\xE1t, \xE9s a nemzetk\xF6zi ir\xE1nyelveket. De az \xD6n v\xE9lem\xE9nye \xE9s \xE9lethelyzete is sz\xE1m\xEDt! B\xE1tran k\xE9rdezzen \xE9s mondja el az agg\xE1lyait.",encourage:["Nem lesz egyed\xFCl. Az onkol\xF3giai csapat \u2013 orvosok, n\u0151v\xE9rek, pszichol\xF3gus, dietetikus, szoci\xE1lis munk\xE1s \u2013 v\xE9gig \xD6nnel lesz.","A legt\xF6bb mell\xE9khat\xE1s j\xF3l kezelhet\u0151, \xE9s a csapat felk\xE9sz\xFClt r\xE1.","K\xE9rdezzen b\xE1tran, b\xE1rmennyiszer. Nincs buta k\xE9rd\xE9s. Minden aggodalom jogos.","Minden ember m\xE1sk\xE9pp reag\xE1l a kezel\xE9sre. Ne hasonl\xEDtsa mag\xE1t m\xE1sokhoz.","A kezel\xE9snek van eleje \xE9s lesz v\xE9ge. Minden egyes ciklus egy l\xE9p\xE9s a c\xE9l fel\xE9."]},J=[{name:"Szteroidok (Dexamethason, Prednisolon)",cat:"Kieg\xE9sz\xEDt\u0151 gy\xF3gyszer",col:"#7B1FA2",desc:"Val\xF3sz\xEDn\u0171leg meglep\u0151, de a szteroidok szinte minden kemoter\xE1pi\xE1s protokollban szerepelnek. Nem az\xE9rt kapja \u0151ket, mert s\xFAlyosabb a betegs\xE9ge! \xC9ppen ellenkez\u0151leg: kit\u0171n\u0151en megel\u0151zik az allergi\xE1s reakci\xF3kat, cs\xF6kkentik a h\xE1nyingert, \xE9s gyullad\xE1sg\xE1tl\xF3 hat\xE1suk is van. Csak r\xF6vid ideig szedi majd, de m\xE9g \xEDgy is lehetnek \xE1tmeneti mell\xE9khat\xE1saik.",fx:[{n:"\xC1lmatlans\xE1g, felp\xF6rg\xE9s",t:"A szteroid szed\xE9se napjain",s:"nagyon gyakori",d:"Ez tal\xE1n a leggyakoribb panasz. Sokan \xFAgy \xE9rzik a szteroid napj\xE1n, mintha t\xEDz k\xE1v\xE9t ittak volna egyszerre. Fontos: ez \xC1TMENETI hat\xE1s, \xE9s vannak bev\xE1lt m\xF3dszerek ellene.",m:["A tablett\xE1t mindig REGGEL vegye be, soha nem este!","Lefekv\xE9s el\u0151tt pr\xF3b\xE1ljon relax\xE1ci\xF3s technik\xE1t (lass\xFA l\xE9gz\xE9s, kellemes zene)","Ker\xFClje a koffeint d\xE9lut\xE1n","Ha t\xF6bb \xE9jszaka sem tud aludni, sz\xF3ljon orvos\xE1nak \u2013 l\xE9teznek biztons\xE1gos megold\xE1sok"]},{n:"Megn\xF6vekedett \xE9tv\xE1gy",t:"A szteroid szed\xE9se napjain",s:"nagyon gyakori",d:"Sokan tapasztalj\xE1k, hogy a szteroid napjain szinte csillap\xEDthatatlan \xE9tv\xE1gyuk van. Ez a gy\xF3gyszer hat\xE1sa, NEM az \xD6n hib\xE1ja, \xE9s NEM jellembeli gyenges\xE9g. A k\xFAra v\xE9gezt\xE9vel az \xE9tv\xE1gy visszat\xE9r a megszokott szintre.",m:["K\xE9sz\xEDtsen el\u0151 eg\xE9szs\xE9ges nassolnival\xF3kat (gy\xFCm\xF6lcs, z\xF6lds\xE9g, di\xF3f\xE9l\xE9k)","Pr\xF3b\xE1ljon kis adagokban, gyakran enni","Ne legyen b\u0171ntudata \u2013 a szteroid csin\xE1lja, nem \xD6n!"]},{n:"V\xE9rcukorszint emelked\xE9se",t:"A szteroid szed\xE9se napjain",s:"gyakori, figyelni kell",d:"A szteroidok \xE1tmeneti v\xE9rcukor-emelked\xE9st okozhatnak m\xE9g azokn\xE1l is, akik nem cukorbetegek. Ez \xE1ltal\xE1ban a szteroid elhagy\xE1sa ut\xE1n rendez\u0151dik, de figyelni kell r\xE1.",m:["Ha szomjasabb a megszokottn\xE1l \xE9s t\xF6bbsz\xF6r kell mosd\xF3ba mennie, jelezze orvos\xE1nak","Szteroid-napokon ker\xFClje az er\u0151sen cukros \xE9teleket, italokat","Ha \xD6n cukorbeteg, mindenk\xE9ppen besz\xE9ljen orvos\xE1val, mert a gy\xF3gyszerek m\xF3dos\xEDt\xE1sa sz\xFCks\xE9ges lehet"]},{n:"Hangulatingadoz\xE1s",t:"A szteroid szed\xE9se napjain",s:"gyakori",d:"Nyugtalans\xE1g, ingerl\xE9kenys\xE9g, hirtelen s\xEDr\xE1s \u2013 ezek mind a gy\xF3gyszer hat\xE1sai, \xE9s egy\xE1ltal\xE1n nem az \xD6n hib\xE1ja. Sok beteg \xE9rzi \xFAgy, hogy a szteroid-napokon nem \xF6nmaga. Ez a szteroid sz\xFCnetel\xE9skor elm\xFAlik.",m:["Sz\xF3ljon a csal\xE1dj\xE1nak, hogy ezeken a napokon egy kicsit m\xE1s lehet a hangulata \u2013 \xEDgy \u0151k is felk\xE9sz\xFClhetnek","S\xE9t\xE1ljon, pr\xF3b\xE1ljon m\xE9lyl\xE9gz\xE9st, hallgasson zen\xE9t","Ha tart\xF3s lehangolts\xE1got vagy szorong\xE1st \xE9rez, felt\xE9tlen\xFCl jelezze orvos\xE1nak","Ne feledje: \xC1TMENETI, a szteroid sz\xFCnetel\xE9skor elm\xFAlik"]},{n:"Gyomorpanaszok",t:"A szteroid szed\xE9se alatt",s:"gyakori",d:"A szteroid irrit\xE1lhatja a gyomor ny\xE1lkah\xE1rty\xE1j\xE1t. Emiatt orvosa gyomorv\xE9d\u0151t is fel\xEDr mell\xE9.",m:["MINDIG \xE9tkez\xE9s UT\xC1N vegye be a szteroidot!","A gyomorv\xE9d\u0151t az orvos \xE1ltal javasolt m\xF3don szedje","Ha er\u0151s gyomorf\xE1j\xE1sa van vagy fekete sz\xE9kletet \xE9szlel, AZONNAL forduljon orvoshoz"]},{n:"Arc puffad\xE1sa",t:"Hosszabb szteroidszed\xE9s eset\xE9n",s:"m\xE9rs\xE9kelt",d:"Hosszabb szteroid-szed\xE9s eset\xE9n az arc kerekebb, puffadtabb v\xE1lhat. Ez nem h\xEDz\xE1s, hanem folyad\xE9kvisszatart\xE1s, \xE9s a k\xFAra v\xE9gezt\xE9vel fokozatosan vissza\xE1ll az eredeti \xE1llapot.",m:["Pr\xF3b\xE1ljon kevesebb s\xF3t fogyasztani","A t\xFCnet \xE1tmeneti \u2013 a szteroid befejez\xE9se ut\xE1n normaliz\xE1l\xF3dik","Ha hirtelen, er\u0151s duzzad\xE1st \xE9szlel (f\u0151leg a l\xE1bain), jelezze orvos\xE1nak"]},{n:"Fert\u0151z\xE9sekre val\xF3 fog\xE9konys\xE1g",t:"A szteroid szed\xE9se alatt",s:"fontos!",d:"A szteroid gyeng\xEDti az immunrendszert, \xE9s ami m\xE9g fontosabb: ELFEDI a l\xE1z t\xFCneteit. Ez azt jelenti, hogy fert\u0151z\xE9s eset\xE9n lehet, hogy nem lesz l\xE1za, holott s\xFAlyos a helyzet.",m:["Rendszeresen mosson kezet","Ker\xFClje a t\xF6megk\xF6zleked\xE9st \xE9s a beteg embereket szteroid-napokon","M\xE9g ha \xFAgy is \xE9rzi, nincs l\xE1za, rossz k\xF6z\xE9rzet eset\xE9n m\xE9rje meg a h\u0151m\xE9rs\xE9klet\xE9t!","B\xE1rmilyen fert\u0151z\xE9s-gyan\xFA eset\xE9n AZONNAL forduljon orvoshoz"]}]},{name:"Tax\xE1nok (Paclitaxel, Docetaxel)",cat:"Kemoter\xE1pi\xE1s szer",col:"#E91E8C",desc:"A tax\xE1nok a sejtoszt\xF3d\xE1s g\xE1tl\xE1s\xE1val hatnak, \xE9s t\xF6bb r\xE1kt\xEDpus kezel\xE9s\xE9ben alapvet\u0151 gy\xF3gyszerek. N\xE9h\xE1ny mell\xE9khat\xE1suk id\u0151vel felhalmoz\xF3dik, ez\xE9rt nagyon fontos a korai jelz\xE9s.",fx:[{n:"Perif\xE9ri\xE1s neurop\xE1tia (zsibbad\xE1s)",t:"Fokozatosan er\u0151s\xF6d\u0151",s:"gyakori, ak\xE1r tart\xF3s",d:"A k\xE9zujjakban, l\xE1bujjakban zsibbad\xE1st, bizserg\xE9st \xE9rezhet, ami ciklusr\xF3l ciklusra fokoz\xF3dhat. Enn\xE9l a mell\xE9khat\xE1sn\xE1l a korai jelz\xE9s k\xFCl\xF6n\xF6sen fontos, mert a kezel\xE9s m\xF3dos\xEDt\xE1s\xE1val megel\u0151zhet\u0151 a s\xFAlyosbod\xE1s.",m:["K\xE9rj\xFCk, jelezze m\xE1r az ELS\u0150 t\xFCneteket orvos\xE1nak \u2013 ilyenkor m\xE9g sokat lehet tenni!","L-glutamin por \u2013 egyes tanulm\xE1nyok szerint cs\xF6kkentheti a neurop\xE1tia s\xFAlyoss\xE1g\xE1t (k\xE9rdezze meg orvos\xE1t!)","Meleg keszty\u0171 \xE9s zokni seg\xEDthet a t\xFCnetek enyh\xEDt\xE9s\xE9ben","K\xE9nyelmes, cs\xFAsz\xE1smentes cip\u0151 \u2013 a zsibbadt talp n\xF6veli a botl\xE1svesz\xE9lyt","Enyhe k\xE9z- \xE9s l\xE1bmassz\xE1zs seg\xEDtheti a v\xE9rkering\xE9st","A panasz a k\xFAra v\xE9gezt\xE9vel \xE1ltal\xE1ban javul, de h\xF3napokig fenn\xE1llhat"]},{n:"Hajhull\xE1s",t:"A kezel\xE9s megkezd\xE9se ut\xE1n 2\u20133 h\xE9ttel",s:"szinte biztos (t\xF6bb mint 95%)",d:"A hajhull\xE1s lelkileg az egyik legnehezebb mell\xE9khat\xE1s, \xE9s teljesen \xE9rthet\u0151, ha nagyon b\xE1ntja. Amit biztosan tudhat: a haj MINDIG visszan\u0151 a kezel\xE9s v\xE9gezt\xE9vel. A Tan\xE1csok szekci\xF3ban r\xE9szletes \xFAtmutat\xF3t tal\xE1l a fejh\u0171t\xE9sr\u0151l, par\xF3k\xE1kr\xF3l, fejb\u0151r\xE1pol\xE1sr\xF3l \xE9s a visszan\xF6v\xE9sr\u0151l.",m:["Javasoljuk, hogy m\xE1r a kezel\xE9s el\u0151tt szerezzen be par\xF3k\xE1t vagy fejfed\u0151ket \u2013 a par\xF3ka TB-t\xE1mogatott!","Fejh\u0171t\xE9s (scalp cooling) \u2013 k\xE9rdezze meg orvos\xE1t, tax\xE1nokn\xE1l jobb hat\xE9konys\xE1ggal m\u0171k\xF6dik","Fejb\u0151r\xE1pol\xF3 olaj vagy aloe vera g\xE9l enyh\xEDtheti a fejb\u0151r irrit\xE1ci\xF3j\xE1t","Szat\xE9n p\xE1rnahuzat cs\xF6kkenti a fejb\u0151r d\xF6rzs\xF6l\xE9s\xE9t alv\xE1s k\xF6zben","SPF-es fejb\u0151rv\xE9d\u0151 vagy sapka a napon \u2013 a kopasz fejb\u0151r nagyon nap\xE9rz\xE9keny!","Ha szeretn\xE9, k\xE9rjen pszichol\xF3giai t\xE1mogat\xE1st \u2013 teljesen norm\xE1lis, ha ez nehezen viselhet\u0151"]},{n:"\xCDz\xFCleti \xE9s izomf\xE1jdalom",t:"A kezel\xE9s ut\xE1ni napokban",s:"gyakori",d:"A bead\xE1s ut\xE1ni napokban \xEDz\xFCleti \xE9s izomf\xE1jdalmat \xE9rezhet, mintha influenz\xE1s lenne. Ez kellemetlen, de \xE1ltal\xE1ban n\xE9h\xE1ny nap alatt elm\xFAlik.",m:["Az orvosa \xE1ltal javasolt f\xE1jdalomcsillap\xEDt\xF3 seg\xEDthet","Meleg f\xFCrd\u0151, enyhe ny\xFAjt\xE1s, s\xE9ta enyh\xEDtheti","Magn\xE9zium-p\xF3tl\xE1s seg\xEDthet az izomg\xF6rcs\xF6k ellen (k\xE9rdezze meg orvos\xE1t!)","Ha nagyon er\u0151s vagy elh\xFAz\xF3d\xF3, besz\xE9ljen kezel\u0151orvos\xE1val"]},{n:"Allergi\xE1s reakci\xF3",t:"F\u0151k\xE9nt az els\u0151 kezel\xE9sekn\xE9l",s:"el\u0151fordulhat",d:"Az el\u0151medik\xE1ci\xF3 (amit a kezel\xE9s el\u0151tt kap) jelent\u0151sen cs\xF6kkenti az allergia es\xE9ly\xE9t. Az els\u0151 inf\xFAzi\xF3t ez\xE9rt mindig lassan adj\xE1k, \xE9s a n\u0151v\xE9rek fokozottan figyelik \xD6nt.",m:["Az el\u0151medik\xE1ci\xF3 ez\xE9rt fontos \u2013 soha ne hagyja ki!","Az els\u0151 bead\xE1s lass\xFA, fokozott fel\xFCgyelet mellett t\xF6rt\xE9nik","Ha b\xE1rmit \xE9rez (viszket\xE9s, h\u0151hull\xE1m, szorong\xE1s, neh\xE9zl\xE9gz\xE9s) \u2013 AZONNAL jelezze!"]}]},{name:"Platinasz\xE1rmaz\xE9kok (Cisplatin, Oxaliplatin)",cat:"Kemoter\xE1pi\xE1s szer",col:"#1565C0",desc:"A platinaalap\xFA szerek a r\xE1kos sejtek DNS-\xE9hez k\xF6t\u0151dve akad\xE1lyozz\xE1k szaporod\xE1sukat. Nagyon hat\xE9konyak, de n\xE9h\xE1ny fontos mell\xE9khat\xE1suk van, amelyekre \xE9rdemes felk\xE9sz\xFClni.",fx:[{n:"H\xE1nyinger \xE9s h\xE1ny\xE1s",t:"A kezel\xE9s napj\xE1t\xF3l t\xF6bb napig",s:"nagyon gyakori",d:"Ezek a gy\xF3gyszerek er\u0151sebb h\xE1nyingert okozhatnak, de a j\xF3 h\xEDr az, hogy ma m\xE1r kiv\xE1l\xF3 h\xE1ny\xE1scsillap\xEDt\xF3k \xE1llnak rendelkez\xE9sre. Orvosa t\xF6bbf\xE9le gy\xF3gyszert fog adni a h\xE1nyinger megel\u0151z\xE9s\xE9re \u2013 fontos, hogy ezeket v\xE9gig szedje a javasolt ideig!",m:["A h\xE1ny\xE1scsillap\xEDt\xF3t MINDIG vegye be, m\xE9g ha j\xF3l is \xE9rzi mag\xE1t!","Gy\xF6mb\xE9res tea, gy\xF6mb\xE9rkapszula vagy citromos v\xEDz sokaknak seg\xEDt","Kis adagokban, gyakran egyen \u2013 szobah\u0151m\xE9rs\xE9klet\u0171, enyhe \xEDz\u0171 \xE9teleket v\xE1lasszon","Akupressz\xFAr\xE1s csukl\xF3p ow will I know if treatment is working?","Hosszabb szteroidszed\xE9s eset\xE9n":"With longer steroid use",Hozz\u00E1tartoz\u00F3knak:"For caregivers","H\xE1nyinger (er\u0151s!)":"Nausea (severe!)","H\xE1nyinger \xE9s h\xE1ny\xE1s":"Nausea and vomiting","H\xF3napokig a kezel\xE9s ut\xE1n is!":"For months after treatment too!","H\xFCvelysz\xE1razs\xE1g \xE9s intim panaszok":"Vaginal dryness and intimate issues","Inf\xFAzi\xF3s reakci\xF3 (Rituximab)":"Infusion reaction (Rituximab)","Jelezze az ELS\u0150 f\xFClz\xFAg\xE1st!":"Report the FIRST tinnitus!","K\xE9rdezzen!":"Ask your doctor!","K\xE9rd\xE9sek az orvosnak":"Questions for the doctor","K\xE9z-l\xE1b szindr\xF3ma":"Hand-foot syndrome","K\xE9zfert\u0151tlen\xEDt\u0151 mindig legyen \xD6nn\xE9l":"Always keep hand sanitizer with you","K\xE9zfert\u0151tlen\xEDt\u0151t tartson mag\xE1n\xE1l":"Always carry hand sanitizer","K\xE9zfert\u0151tlen\xEDt\u0151t tartson mag\xE1n\xE1l a t\xE1sk\xE1j\xE1ban \xE9s az aut\xF3j\xE1ban":"Keep hand sanitizer in your bag and car","Lelki eg\xE9szs\xE9g":"Mental health","L\xE1z 38 \xB0C felett: AZONNAL a k\xF3rh\xE1zba, ne v\xE1rjon!":"Fever above 38\xB0C (100.4\xB0F): go to the hospital IMMEDIATELY, don't wait!","L\xE1z 38 \xB0C felett: AZONNAL orvoshoz!":"Fever above 38\xB0C (100.4\xB0F): see a doctor IMMEDIATELY!","Magas v\xE9rnyom\xE1s, feh\xE9rjevizel\xE9s":"High blood pressure, proteinuria",Mell\u00E9khat\u00E1s:"Side effect","Mi is az a kemoter\xE1pia?":"What is chemotherapy?","Mikor h\xEDvjon orvost azonnal":"When to call the doctor immediately","Mindennapi \xE9let":"Daily life","Mindennapi \xE9let a kezel\xE9s alatt":"Daily life during treatment","Mindig hordjon mag\xE1n\xE1l k\xE9zfert\u0151tlen\xEDt\u0151t \u2013 ha nincs k\xE9zmos\xE1si lehet\u0151s\xE9g, ez a legjobb alternat\xEDva":"Always carry hand sanitizer \u2014 when handwashing isn't possible, it's the best alternative","Mit v\xE1rhat az els\u0151 alkalommal":"What to expect the first time","Mi\xE9rt alkalmazz\xE1k?":"Why is it used?","Mi\xE9rt kell t\xF6bbf\xE9le gy\xF3gyszer?":"Why multiple drugs?","M\xE1r a kezel\xE9s napj\xE1n kezd\u0151dik":"Starting from treatment day","Nagyon gyakori az els\u0151 alkalommal":"Very common at first","Napi r\xF6vid s\xE9ta jobban seg\xEDt, mint a folyamatos pihen\xE9s":"A short daily walk helps more than constant rest","Neurop\xE1tia (zsibbad\xE1s)":"Neuropathy (numbness)","Neurop\xE1tia (zsibbad\xE1s, bizserg\xE9s)":"Neuropathy (numbness, tingling)","Orrsz\xE1razs\xE1g \xE9s orrv\xE9rz\xE9s":"Nasal dryness and nosebleeds","Orvosa d\xF6nti el, sz\xFCks\xE9ges-e feh\xE9rv\xE9rsejt-n\xF6vel\u0151 injekci\xF3 (G-CSF)":"Your doctor decides if white blood cell boosting injections (G-CSF) are needed","Orvosa d\xF6nti el, sz\xFCks\xE9ges-e feh\xE9rv\xE9rsejt-n\xF6vel\u0151 injekci\xF3":"Your doctor decides if white blood cell boosting injections are needed","Par\xF3k\xE1t EL\u0150TTE szerezzen be (TB-t\xE1mogat\xE1s ig\xE9nyelhet\u0151!)":"Get a wig BEFOREHAND (insurance coverage available!)","Pszichol\xF3giai t\xE1mogat\xE1s":"Psychological support","Pszichol\xF3giai \xE9s szoci\xE1lis t\xE1mogat\xE1s":"Psychological and social support","Seg\xEDts\xE9g a csal\xE1dnak":"Help for the family","Szemsz\xE1razs\xE1g, k\xF6nnyez\xE9s":"Dry eyes, tearing","Szint\xE9n tax\xE1n. A Paclitaxel alternat\xEDv\xE1ja, hasonl\xF3 hat\xE1smechanizmussal.":"Also a taxane. Alternative to Paclitaxel, with similar mechanism of action.","Szokatlan v\xE9rz\xE9s, v\xE9ral\xE1fut\xE1s: jelezze orvos\xE1nak":"Unusual bleeding, bruising: report to your doctor","Szokatlan v\xE9rz\xE9s, v\xE9ral\xE1fut\xE1s: jelezze orvos\xE1nak (v\xE9rlemezk\xE9k!)":"Unusual bleeding, bruising: report to your doctor (platelets!)","Szokatlan v\xE9rz\xE9s, v\xE9ral\xE1fut\xE1s: jelezze!":"Unusual bleeding, bruising: report it!","Sz\xE1jny\xE1lkah\xE1rtya-gyullad\xE1s":"Oral mucositis","Sz\xE9d\xFCl\xE9s \xE9s egyens\xFAlyzavar":"Dizziness and balance problems",Sz\u00E9kreked\u00E9s:"Constipation","Sz\xEDvdobog\xE1s\xE9rz\xE9s, pulzusemelked\xE9s":"Palpitations, increased heart rate","S\xFAlyveszt\xE9s, alult\xE1pl\xE1lts\xE1g":"Weight loss, malnutrition","S\xFAlyveszt\xE9s, em\xE9szt\xE9si zavar":"Weight loss, digestive problems",Tan\u00E1csok:"Tips","Tax\xE1n t\xEDpus\xFA szer. A sejtoszt\xF3d\xE1st g\xE1tolja. Nem mindenki kapja \u2013 az orvos d\xF6nt r\xF3la.":"Taxane-type drug. Inhibits cell division. Not everyone receives it \u2014 the doctor decides.","Term\xE9kenys\xE9g, szexualit\xE1s, hormonok":"Fertility, sexuality, hormones","Tervezze meg a napjait \u2013 a fontosabb teend\u0151ket a jobb napokra":"Plan your days \u2014 schedule important tasks for better days","T\xFCd\u0151k\xE1rosod\xE1s (Bleomycin-pneumonitis)":"Lung damage (Bleomycin pneumonitis)",Vesek\u00E1rosod\u00E1s:"Kidney damage",V\u00E9szhelyzet:"Emergency","az els\u0151 alkalommal gyakori":"common at first treatment",el\u0151fordulhat:"may occur","el\u0151fordulhat, figyelni kell r\xE1":"may occur, needs monitoring","fontos!":"important!","fontos, odafigyel\xE9st ig\xE9nyel":"important, needs attention","fontos, rendszeres ellen\u0151rz\xE9s kell":"important, regular monitoring needed","fontos, tart\xF3s":"important, lasting","fontos, tervezni kell!":"important, needs planning!",gyakori:"common","gyakori (ha Bevacizumabot kap)":"common (if receiving Bevacizumab)","gyakori, ak\xE1r s\xFAlyos":"common, can be severe","gyakori, ak\xE1r tart\xF3s":"common, potentially lasting","gyakori, de \xE1ltal\xE1ban \xE1rtalmatlan":"common but usually harmless","gyakori, figyelni kell":"common, needs monitoring","gyakori, figyelni kell r\xE1":"common, needs monitoring",m\u00E9rs\u00E9kelt:"moderate","nagyon gyakori":"very common","nagyon ritka, de s\xFAlyos":"very rare but serious","ritka, de potenci\xE1lisan s\xFAlyos":"rare but potentially serious","ritka, de s\xFAlyos":"rare but serious","ritka, de \xE9letvesz\xE9lyes!":"rare but life-threatening!","szinte biztos":"almost certain","\xC1ltal\xE1nos mell\xE9khat\xE1s":"General side effect","\xCDz\xFCletf\xE1jdalom, izomf\xE1jdalom":"Joint and muscle pain","\xE1rtalmatlan!":"harmless!","\u2190 Vissza":"\u2190 Back","A Paclitaxel az egyik olyan gy\xF3gyszer, amelyn\xE9l el\u0151fordulhat allergi\xE1s reakci\xF3, f\u0151leg az els\u0151 alkalommal. Az el\u0151medik\xE1ci\xF3 \xE9s a lass\xFA bead\xE1s jelent\u0151sen cs\xF6kkenti a kock\xE1zatot.":"Paclitaxel is one of the drugs where allergic reactions may occur, especially the first time. Pre-medication and slow administration significantly reduce the risk.","A Paclitaxel inf\xFAzi\xF3j\xE1nak elej\xE9n fokozott allergiafigyel\xE9s t\xF6rt\xE9nik":"Increased allergy monitoring at the beginning of Paclitaxel infusion","A Taxol-f\xE1zisban a Paclitaxelt lassabban adj\xE1k (az els\u0151 alkalom a leghosszabb)":"In the Taxol phase, Paclitaxel is given more slowly (the first session is the longest)","A bead\xE1s k\xF6zben":"During administration","A bead\xE1s ut\xE1n m\xE9g egy ideig megfigyelik":"You'll be observed for a while after administration","A feh\xE9rv\xE9rsejtek sz\xE1ma \xE1tmenetileg cs\xF6kken, ami fokozza a fert\u0151z\xE9sre val\xF3 fog\xE9konys\xE1got.":"White blood cell count temporarily decreases, increasing susceptibility to infection.","A h\xE1ny\xE1scsillap\xEDt\xF3t az orvos \xE1ltal megadott s\xE9ma szerint szedje!":"Take anti-nausea medication according to your doctor's schedule!","A kezel\xE9s alatti f\xE1radts\xE1g m\xE1s, mint a megszokott: nem m\xFAlik el alv\xE1st\xF3l. De enyhe mozg\xE1s meglep\u0151en sokat seg\xEDt.":"Fatigue during treatment is different from normal tiredness: it doesn't go away with sleep. But light exercise helps surprisingly much.","A kezel\xE9s k\xF6zben k\xE9nyelmesen \xFClhet vagy fekhet. Sokan olvasnak, zen\xE9t hallgatnak, filmet n\xE9znek, vagy egyszer\u0171en pihennek. A n\u0151v\xE9rek rendszeresen ellen\u0151rzik az \xE1llapot\xE1t.":"During treatment you can sit or lie comfortably. Many people read, listen to music, watch movies, or simply rest. Nurses regularly check on you.","A kezel\xE9s megkezd\xE9se el\u0151tt az orvosi csapat alapos vizsg\xE1latokat v\xE9gez, hogy megbizonyosodjon r\xF3la: \xD6n biztons\xE1gosan megkaphatja a kezel\xE9st. Ezek a vizsg\xE1latok \xE1ltal\xE1ban a k\xF6vetkez\u0151k:":"Before starting treatment, your medical team performs thorough examinations to ensure you can safely receive treatment. These usually include:","A kezel\xE9s ut\xE1n ne vezessen!":"Don't drive after treatment!","A kezel\xE9st t\xF6bb f\xE1zisban, ciklusokban kapja, az orvosa \xE1ltal meghat\xE1rozott \xFCtemez\xE9sben. A pontos gy\xF3gyszerkombin\xE1ci\xF3t, ciklussz\xE1mot \xE9s d\xF3zist az \xD6n egy\xE9ni helyzete alapj\xE1n az orvosi csapat hat\xE1rozza meg. Gyakori kombin\xE1ci\xF3 p\xE9ld\xE1ul az AC (Doxorubicin + Cyclophosphamid), amit tax\xE1n k\xF6vethet, de m\xE1s \xF6ssze\xE1ll\xEDt\xE1s is lehets\xE9ges.":"You'll receive treatment in phases and cycles, on a schedule determined by your doctor. The exact drug combination, number of cycles, and dosage are determined by your medical team based on your individual situation. A common combination is AC (Doxorubicin + Cyclophosphamide), which may be followed by a taxane, but other arrangements are also possible.","A modern h\xE1ny\xE1scsillap\xEDt\xF3kkal a legt\xF6bb beteg j\xF3l boldogul. A kulcs az, hogy a h\xE1ny\xE1scsillap\xEDt\xF3t \xFCtemezetten szedje, m\xE9g ha j\xF3l is \xE9rzi mag\xE1t!":"With modern anti-nausea medications, most patients manage well. The key is to take anti-nausea medication on schedule, even if you feel fine!","A n\u0151v\xE9rek rendszeresen ellen\u0151rzik a v\xE9rnyom\xE1st, pulzust, h\u0151m\xE9rs\xE9kletet":"Nurses regularly check blood pressure, pulse, and temperature","A pontos id\u0151tartamot a kezel\u0151orvos hat\xE1rozza meg \u2013 \xD6n egy\xE9ni eset\xE9ben k\xE9rje t\u0151l\xFCk a r\xE9szleteket":"The exact duration is determined by your doctor \u2014 ask them for details specific to your case","A t\xE1pl\xE1lkoz\xE1s fontos a kezel\xE9s sor\xE1n. Nem kell drasztikus di\xE9t\xE1t tartania, de n\xE9h\xE1ny egyszer\u0171 szab\xE1ly betart\xE1sa sokat seg\xEDt:":"Nutrition is important during treatment. You don't need a drastic diet, but following a few simple rules helps a lot:",ALACSONY:"LOW","AZONNAL forduljon orvoshoz vagy h\xEDvja a ment\u0151ket, \xE9jjel-nappal! Ne v\xE1rjon reggelig!":"Contact your doctor or call emergency services IMMEDIATELY! Don't wait until morning!","AZONNAL forduljon orvoshoz, \xE9jjel-nappal:":"Contact your doctor IMMEDIATELY, day or night:","Akupressz\xFAr\xE1s csukl\xF3p\xE1nt (Sea-Band) \u2013 gy\xF3gyszert\xE1rban kaphat\xF3, sok beteg szerint enyh\xEDti a h\xE1nyingert":"Acupressure wristband (Sea-Band) \u2014 available at pharmacies, many patients find it reduces nausea","Alkil\xE1l\xF3 szer. Gyakran alkalmazz\xE1k Doxorubicinnel egy\xFCtt.":"Alkylating agent. Often used together with Doxorubicin.","Alkohol (a kezel\xE9s el\u0151tt \xE9s ut\xE1n ker\xFClend\u0151)":"Alcohol (avoid before and after treatment)","Allergiamegel\u0151z\u0151 szer (a Taxol-f\xE1zis el\u0151tt)":"Allergy prevention medication (before Taxol phase)","Antraciklinek csal\xE1dja. Hat\xE9konyan puszt\xEDtja a r\xE1kos sejteket a DNS k\xE1ros\xEDt\xE1s\xE1val. Jellegzetesen v\xF6r\xF6s sz\xEDn\u0171 inf\xFAzi\xF3.":"Anthracycline family. Effectively destroys cancer cells by damaging DNA. Characteristically red-colored infusion.","Az AC-f\xE1zisban k\xE9t gy\xF3gyszert kap egym\xE1s ut\xE1n, inf\xFAzi\xF3ban":"In the AC phase, you receive two drugs one after another, by infusion","Az els\u0151 alkalom mindig k\xFCl\xF6nleges. Kicsit tov\xE1bb tart, \xE9s sok minden \xFAjdons\xE1g lesz. Az eg\xE9sz csapat az\xE9rt van ott, hogy \xD6nt t\xE1mogassa \xE9s v\xE9gigvezesse a folyamaton.":"The first time is always special. It takes a bit longer, and many things will be new. The entire team is there to support you and guide you through the process.","Az els\u0151 alkalommal a fel\xFCgyelet fokozott. Ez nem az\xE9rt van, mert vesz\xE9lyesebb, hanem mert m\xE9g nem tudj\xE1k, hogyan reag\xE1l az \xD6n szervezete.":"Supervision is increased at the first session. This isn't because it's more dangerous, but because they don't yet know how your body will react.","Az els\u0151 alkalomra mindenk\xE9ppen j\xF6jj\xF6n k\xEDs\xE9r\u0151vel. Nemcsak az\xE9rt, mert a kezel\xE9s hossz\xFA \xE9s f\xE1raszt\xF3, hanem az\xE9rt is, mert rengeteg \xFAj inform\xE1ci\xF3t kap, \xE9s j\xF3, ha van mellette valaki, aki seg\xEDt mindezt feldolgozni.":"Definitely bring a companion to the first session. Not just because treatment is long and tiring, but also because you'll receive a lot of new information, and it helps to have someone who can help process it all.","Az els\u0151 nap hosszabb a k\xE9s\u0151bbi alkalmaknal \u2013 sz\xE1m\xEDtson r\xE1!":"The first day is longer than later sessions \u2014 expect this!","Az els\u0151 napokban legyen valaki \xD6nnel otthon":"Have someone with you at home for the first few days","Az eml\u0151r\xE1k kemoter\xE1pi\xE1s kezel\xE9s\xE9ben az al\xE1bbi hat\xF3anyagokat haszn\xE1lj\xE1k leggyakrabban. Az orvos az \xD6n daganat\xE1nak t\xEDpusa, st\xE1diuma \xE9s egy\xE9ni helyzete alapj\xE1n v\xE1lasztja ki, melyik gy\xF3gyszereket \xE9s milyen kombin\xE1ci\xF3ban kapja. Nem felt\xE9tlen\xFCl kap mindegyikb\u0151l! El\u0151fordulhat, hogy csak egyet vagy kett\u0151t kap ezekb\u0151l, m\xE1s sorrendben vagy m\xE1s kombin\xE1ci\xF3ban, mint ami itt szerepel.":"The following drugs are most commonly used in breast cancer chemotherapy. Your doctor selects which drugs and combination you receive based on your tumor type, stage, and individual situation. You may not receive all of them! You might get only one or two, in a different order or combination than listed here.","Az esetek kisebb r\xE9sz\xE9ben fordul el\u0151, f\u0151k\xE9nt az els\u0151 alkalmakkor":"Occurs in a minority of cases, mainly during first treatments","Az inf\xFAzi\xF3 elej\xE9n":"At the beginning of infusion","Az orvos megn\xE9zi az eredm\xE9nyeket, megk\xE9rdi, hogyan \xE9rzi mag\xE1t, \xE9s j\xF3v\xE1hagyja a kezel\xE9st":"The doctor reviews results, asks how you feel, and approves treatment","Az orvosi csapat telefonon is el\xE9rhet\u0151, ha k\xE9rd\xE9se mer\xFClne fel":"The medical team is reachable by phone if you have questions","Beleegyez\u0151 nyilatkozatot fog al\xE1\xEDrni, amelyben r\xE9szletesen le\xEDrj\xE1k a kezel\xE9st":"You'll sign a consent form that describes the treatment in detail","Be\xFCltetett kan\xFCl (Port-a-cath) haszn\xE1lata cs\xF6kkenti az irrit\xE1ci\xF3t":"Using an implanted port (Port-a-cath) reduces irritation","B\u0151rp\xEDr a v\xE9na ment\xE9n, lok\xE1lis f\xE1jdalom":"Redness along the vein, local pain","B\u0151s\xE9ges folyad\xE9kbevitel az el\u0151z\u0151 nap \xE9s a kezel\xE9s napjain":"Plenty of fluids the day before and on treatment days","Citromos vagy ment\xE1s cukorka seg\xEDthet a rossz sz\xE1j\xEDz ellen":"Lemon or mint candy can help with bad taste","D-vitamin-szintet \xE9rdemes ellen\u0151riztetni \u2013 a hi\xE1ny fokozza a f\xE1radts\xE1got, \xE9s kemoter\xE1pia alatt gyakori":"Vitamin D levels are worth checking \u2014 deficiency increases fatigue and is common during chemotherapy",EKG:"ECG",El\u0151medik\u00E1ci\u00F3:"Pre-medication","El\u0151medik\xE1ci\xF3 \xE9s lass\xFA bead\xE1si temp\xF3":"Pre-medication and slow infusion rate","Enyhe k\xE9z- \xE9s l\xE1bmassz\xE1zs seg\xEDtheti a v\xE9rkering\xE9st":"Gentle hand and foot massage may improve circulation","Ez az egyik \xE9rzelmileg legnehezebb mell\xE9khat\xE1s. A haj MINDIG visszan\u0151, de tudjuk, hogy ez most nem vigasztal\xE1s. A Tan\xE1csok szekci\xF3ban r\xE9szletes \xFAtmutat\xF3t tal\xE1l a felk\xE9sz\xFCl\xE9sr\u0151l, fejb\u0151r\xE1pol\xE1sr\xF3l, par\xF3k\xE1kr\xF3l \xE9s a lelki feldolgoz\xE1sr\xF3l.":"This is one of the emotionally hardest side effects. Hair ALWAYS grows back, but we know that's not comforting right now. You'll find a detailed guide in the Tips section on preparation, scalp care, wigs, and emotional processing.","FOKOZOTT FIGYELEM":"CLOSE MONITORING","Fejh\u0171t\xE9s (scalp cooling) lehet\u0151s\xE9g\xE9r\u0151l k\xE9rdezze meg orvos\xE1t a kezel\xE9s EL\u0150TT!":"Ask your doctor about scalp cooling BEFORE treatment starts!","Gr\xE9pfr\xFAt \xE9s pomelo (beavatkozhat a gy\xF3gyszerek lebont\xE1s\xE1ba!)":"Grapefruit and pomelo (may interfere with drug metabolism!)",Gyomorv\u00E9d\u0151:"Stomach protector","Gy\xF6mb\xE9res tea (term\xE9szetes h\xE1nyingercsillap\xEDt\xF3)":"Ginger tea (natural anti-nausea)","Gy\xF6mb\xE9res tea, citromos v\xEDz sokaknak seg\xEDt":"Ginger tea, lemon water helps many people","Ha a gy\xF3gyszer a v\xE9n\xE1b\xF3l kil\xE9p: azonnali le\xE1ll\xEDt\xE1s, a csapatnak van protokollja \xE9s ellenszere.":"If the drug leaks from the vein: immediate stop, the team has a protocol and antidote.","Ha nem tud enni a f\xE1jdalom miatt: jelezze orvos\xE1nak \u2013 f\xE1jdalomcsillap\xEDt\xF3 sz\xE1jg\xE9l \xE9s speci\xE1lis t\xE1pszerek is l\xE9teznek!":"If you can't eat due to pain: tell your doctor \u2014 pain-relieving mouth gel and special nutritional products exist!","Ha reakci\xF3 t\xF6rt\xE9nik, az inf\xFAzi\xF3t azonnal le\xE1ll\xEDtj\xE1k. Enyhe esetben lassabban \xFAjraind\xEDthat\xF3. Sz\xFCks\xE9g eset\xE9n alternat\xEDv gy\xF3gyszer \xE1ll rendelkez\xE9sre.":"If a reaction occurs, the infusion is stopped immediately. In mild cases, it can be restarted more slowly. If needed, alternative medication is available.","Ha sz\xFCks\xE9ges, be\xFCltetett kan\xFCl (Port-a-cath) alkalmaz\xE1s\xE1r\xF3l is d\xF6ntenek":"If needed, they'll decide about using an implanted port (Port-a-cath)","Hepatitis B \xE9s C szerol\xF3gia":"Hepatitis B and C serology","H\xE1ny\xE1scsillap\xEDt\xF3 (p\xE9ld\xE1ul Ondansetron)":"Anti-nausea medication (e.g., Ondansetron)","H\xE1ny\xE1scsillap\xEDt\xF3 \xE9s szteroid bead\xE1sa":"Administration of anti-nausea medication and steroid","J\xE9gkocka szopogat\xE1sa az inf\xFAzi\xF3 k\xF6zben (or\xE1lis krioteri\xE1pia) \u2013 cs\xF6kkenti a sz\xE1jsebek kialakul\xE1s\xE1nak es\xE9ly\xE9t":"Sucking ice chips during infusion (oral cryotherapy) \u2014 reduces the chance of mouth sores","Kan\xFCl behelyez\xE9se vagy a be\xFCltetett port megsz\xFAr\xE1sa":"Cannula insertion or accessing the implanted port","Kemoter\xE1pia bead\xE1sa":"Chemotherapy administration","Ker\xFClje a f\u0171szeres, savany\xFA, forr\xF3 \xE9teleket, valamint a ropog\xF3s, kem\xE9ny falatokat":"Avoid spicy, acidic, hot foods, as well as crunchy, hard bites","Kipirul\xE1s, viszket\xE9s, neh\xE9zl\xE9gz\xE9s, mellkasi szor\xEDt\xE1s, h\xE1tf\xE1jdalom":"Flushing, itching, difficulty breathing, chest tightness, back pain","Kis adag\xFA, gyakori \xE9tkez\xE9s (ne hagyja mag\xE1t \xE9hezni!)":"Small, frequent meals (don't let yourself go hungry!)","Kontroll\xE1lhatatlan h\xE1ny\xE1s t\xF6bb mint egy napja":"Uncontrollable vomiting for more than a day","K\xE9nyelmes, cs\xFAsz\xE1smentes cip\u0151 a biztons\xE1gos k\xF6zleked\xE9shez":"Comfortable, non-slip shoes for safe mobility","K\xEDs\xE9r\u0151vel j\xF6jj\xF6n!":"Bring a companion!","K\xF6nny\u0171 reggeli a kezel\xE9s napj\xE1n (ne \xFCres gyomorra j\xF6jj\xF6n!)":"Light breakfast on treatment day (don't come on an empty stomach!)","K\xF6zvetlen\xFCl a kemoter\xE1pia el\u0151tt \xFAgynevezett el\u0151medik\xE1ci\xF3s gy\xF3gyszereket kap, amelyek cs\xF6kkentik a mell\xE9khat\xE1sok kock\xE1zat\xE1t. Jellemz\u0151en h\xE1ny\xE1scsillap\xEDt\xF3t, allergiamegel\u0151z\u0151 szert \xE9s gyomorv\xE9d\u0151t tartalmaznak. Az \xF6sszet\xE9telt \xE9s adagol\xE1st orvosa az \xD6n sz\xE1m\xE1ra egyedileg hat\xE1rozza meg.":"Just before chemotherapy, you'll receive pre-medications that reduce the risk of side effects. These typically include anti-nausea medication, allergy prevention, and stomach protection. The composition and dosage are individually determined by your doctor.","L-glutamin por \u2013 egyes tanulm\xE1nyok szerint cs\xF6kkentheti a neurop\xE1tia s\xFAlyoss\xE1g\xE1t (k\xE9rdezze meg orvos\xE1t!)":"L-glutamine powder \u2014 some studies suggest it may reduce neuropathy severity (ask your doctor!)",Laborvizsg\u00E1lat:"Lab tests","L\xE1z 38 \xB0C vagy afelett":"Fever 38\xB0C (100.4\xB0F) or above","Maga a kezel\xE9s \u2013 nyugodtan olvashat, zen\xE9t hallgathat, pihenhet":"The treatment itself \u2014 you can read, listen to music, or rest","Meleg keszty\u0171 \xE9s zokni a kezel\xE9s k\xF6zben \u2013 a h\u0171t\xE9s \xE9s meleg\xEDt\xE9s egyar\xE1nt vizsg\xE1lt m\xF3dszer":"Warm gloves and socks during treatment \u2014 both cooling and warming are being studied","M\xE1j- \xE9s vesefunkci\xF3":"Liver and kidney function","Neh\xE9zl\xE9gz\xE9s, mellkasi f\xE1jdalom":"Difficulty breathing, chest pain","Nyers h\xFAs, hal, toj\xE1s (cs\xF6kkent immunit\xE1s eset\xE9n fert\u0151z\xE9svesz\xE9ly)":"Raw meat, fish, eggs (infection risk with weakened immunity)","Orvos v\xE9gig a helysz\xEDnen":"Doctor on site throughout","Orvosi vizit":"Doctor's visit","Par\xF3k\xE1t EL\u0150TTE szerezzen be (TB-t\xE1mogat\xE1s ig\xE9nyelhet\u0151!)":"Get a wig BEFOREHAND (insurance coverage available!)","Puha fogkefe \xE9s alkoholmentes sz\xE1jv\xEDz (pl. Biotene)":"Soft toothbrush and alcohol-free mouthwash (e.g., Biotene)","Regisztr\xE1ci\xF3 \xE9s bejelentkez\xE9s a nappali k\xF3rh\xE1zban":"Registration and check-in at the day hospital","Rendszeres v\xE9rnyom\xE1s- \xE9s pulzusm\xE9r\xE9s":"Regular blood pressure and pulse monitoring","R\xE9szletes allergia-anamn\xE9zist vesznek fel":"They'll take a detailed allergy history","R\xE9szletes t\xE1j\xE9koztat\xF3t a Tan\xE1csok szekci\xF3ban tal\xE1l":"You'll find detailed information in the Tips section","R\xF6vid v\xE9rv\xE9tel, majd v\xE1rakoz\xE1s az eredm\xE9nyre":"Brief blood draw, then waiting for results","SPF-es fejb\u0151rv\xE9d\u0151 vagy sapka a napon \u2013 a kopasz fejb\u0151r nagyon \xE9rz\xE9keny!":"SPF scalp protection or hat in the sun \u2014 bare scalp is very sensitive!","Szat\xE9n vagy selyem p\xE1rnahuzat cs\xF6kkenti a fejb\u0151r d\xF6rzs\xF6l\xE9s\xE9t":"Satin or silk pillowcase reduces scalp friction","Szint\xE9n tax\xE1n. A Paclitaxel alternat\xEDv\xE1ja, hasonl\xF3 hat\xE1smechanizmussal.":"Also a taxane. Alternative to Paclitaxel with similar mechanism of action.","Szobah\u0151m\xE9rs\xE9klet\u0171, szagtalan \xE9teleket v\xE1lasszon \u2013 a meleg \xE9tel illata fokozhatja a h\xE1nyingert":"Choose room-temperature, odorless foods \u2014 the smell of warm food can increase nausea","Szokatlan v\xE9rz\xE9s vagy nagy kiterjed\xE9s\u0171 v\xE9ral\xE1fut\xE1sok":"Unusual bleeding or extensive bruising","Szteroid (p\xE9ld\xE1ul Dexamethason) \u2013 allergia- \xE9s h\xE1nyingermegel\u0151z\xE9s":"Steroid (e.g., Dexamethasone) \u2014 allergy and nausea prevention","Sz\xE1jbalzsam, ajak\xE1pol\xF3 \u2013 a sz\xE1raz, repedezett ajkak kapuk\xE9nt szolg\xE1lnak a fert\u0151z\xE9seknek":"Lip balm \u2014 dry, cracked lips serve as gateways for infection","Sz\xEDv-ultrahang \u2013 a sz\xEDv pumpafunkci\xF3j\xE1nak ellen\u0151rz\xE9se":"Cardiac ultrasound \u2014 checking heart pump function","Sz\xF3dabikarb\xF3n\xE1s \xF6bl\xEDt\xE9s naponta t\xF6bbsz\xF6r (1 te\xE1skan\xE1l sz\xF3dabikarb\xF3na 2,5 dl langyos v\xEDzben)":"Baking soda rinse several times daily (1 teaspoon baking soda in 250ml warm water)","S\xFCrg\u0151ss\xE9gi felszerel\xE9s k\xE9szenl\xE9tben (ez standard, nem kell megijedni!)":"Emergency equipment on standby (this is standard, don't be alarmed!)","Tax\xE1n t\xEDpus\xFA szer. A sejtoszt\xF3d\xE1st g\xE1tolja. Nem mindenki kapja \u2013 az orvos d\xF6nt r\xF3la.":"Taxane-type drug. Inhibits cell division. Not everyone receives it \u2014 the doctor decides.","Teljes v\xE9rk\xE9p (feh\xE9r- \xE9s v\xF6r\xF6sv\xE9rsejtek, v\xE9rlemezk\xE9k)":"Complete blood count (white cells, red cells, platelets)","Tengervizes orrspray (pl. Sterimar) seg\xEDt nedvesen tartani az orrny\xE1lkah\xE1rty\xE1t, ami term\xE9szetes v\xE9d\u0151vonal a fert\u0151z\xE9sek ellen":"Saline nasal spray (e.g., Sterimar) helps keep the nasal mucosa moist, a natural defense against infection","Terhess\xE9gi teszt (term\xE9kenyk\xE9pes korban)":"Pregnancy test (if of childbearing age)","Tests\xFAly m\xE9r\xE9se (a pontos d\xF3zis kisz\xE1m\xEDt\xE1s\xE1hoz)":"Body weight measurement (for precise dose calculation)","Tudjuk, hogy az els\u0151 \xE9rkez\xE9s izgalmas pillanat. \xCDme, mire sz\xE1m\xEDthat \u2013 \xEDgy nem \xE9ri v\xE1ratlan meglepet\xE9s:":"We know the first arrival is an exciting moment. Here's what to expect \u2014 so nothing catches you off guard:","Val\xF3di allergia a Doxorubicinre ritka. Ami gyakrabban el\u0151fordul, az a v\xE9n\xE1t \xE9rint\u0151 lok\xE1lis irrit\xE1ci\xF3.":"True allergy to Doxorubicin is rare. What occurs more commonly is local irritation of the vein.","Val\xF3di allergia ritka; v\xE9nairrit\xE1ci\xF3 gyakoribb":"True allergy rare; vein irritation more common","Vasban \xE9s feh\xE9rj\xE9ben gazdag \xE9trend seg\xEDtheti a v\xE9rk\xE9pz\xE9st":"A diet rich in iron and protein can support blood cell production",V\u00E9nab\u00EDztos\u00EDt\u00E1s:"IV access","V\xE9res vizelet vagy sz\xE9klet":"Blood in urine or stool","Zsibbad\xE1s, bizserg\xE9s az ujjakban, talpakban. Ha \xD6n nem kap tax\xE1nt, ez a mell\xE9khat\xE1s nem relev\xE1ns. A korai jelz\xE9s k\xFCl\xF6n\xF6sen fontos!":"Numbness, tingling in fingers and soles. If you're not receiving a taxane, this side effect is not relevant to you. Early reporting is especially important!","Zs\xEDros, neh\xE9z \xE9telek a kezel\xE9s napj\xE1n":"Fatty, heavy foods on treatment day","intrav\xE9n\xE1s inf\xFAzi\xF3":"intravenous infusion",\u00C9rkez\u00E9s:"Arrival",", nem k\xE9pzel\u0151d\xE9s \xE9s nem a kor jele.":", not imagination and not a sign of aging.",". De tudjuk, hogy ez most, a diagn\xF3zis pillanat\xE1ban, nem felt\xE9tlen\xFCl vigasz.":". But we know that right now, at the moment of diagnosis, this may not be comforting.",". Egyes kemoter\xE1pi\xE1s szerek (k\xFCl\xF6n\xF6sen a Cyclophosphamid \xE9s a platinasz\xE1rmaz\xE9kok) \xE1tmenetileg vagy tart\xF3san k\xE1ros\xEDthatj\xE1k a term\xE9kenys\xE9get.":". Some chemotherapy drugs (especially Cyclophosphamide and platinum agents) can temporarily or permanently affect fertility.","4-7-8 l\xE9gz\u0151gyakorlat":"4-7-8 breathing exercise","5-4-3-2-1 grounding (f\xF6ldel\xE9s)":"5-4-3-2-1 grounding technique","A betegek mintegy 25-30%-\xE1n\xE1l a t\xF6bbsz\xF6ri kezel\xE9s ut\xE1n klasszikus kondicion\xE1l\xF3d\xE1s alakulhat ki: m\xE1r a k\xF3rh\xE1z l\xE1tv\xE1nya vagy szaga kiv\xE1lthatja a h\xE1nyingert. Ez nem k\xE9pzel\u0151d\xE9s \u2013 ez val\xF3di, agyi folyamat.":"In about 25-30% of patients, after multiple treatments, classical conditioning can develop: just seeing or smelling the hospital can trigger nausea. This is not imagination \u2014 it's a real brain process.","A cs\xF6kkent immunrendszer idej\xE9n n\xE9h\xE1ny egyszer\u0171 \xF3vint\xE9zked\xE9s seg\xEDt megel\u0151zni a fert\u0151z\xE9seket:":"During weakened immunity, a few simple precautions help prevent infections:","A daganatos betegs\xE9g \xE9s a kemoter\xE1pia komoly lelki megterhel\xE9s. Az NCCN (Nemzeti R\xE1kellenes H\xE1l\xF3zat) aj\xE1nl\xE1sa szerint fontos, hogy id\u0151r\u0151l id\u0151re felm\xE9rje, mennyire \xE9rzi mag\xE1t megterhelve. Az al\xE1bbi sk\xE1l\xE1n jel\xF6lje meg, hogyan \xE9rez most:":"Cancer and chemotherapy are a serious emotional burden. According to NCCN guidelines, it's important to periodically assess how burdened you feel. On the scale below, indicate how you feel now:","A fejh\u0171t\xE9s a kezel\xE9s k\xF6zben leh\u0171ti a fejb\u0151rt, cs\xF6kkentve a kemoter\xE1pi\xE1s szer eljut\xE1s\xE1t a hajhagym\xE1khoz.":"Scalp cooling chills the scalp during treatment, reducing the chemotherapy drug's reach to hair follicles.","A hajhull\xE1s a testk\xE9pv\xE1ltoz\xE1s legl\xE1tv\xE1nyosabb form\xE1ja. Teljesen rendben van, ha gy\xE1szol, s\xEDr, d\xFCh\xF6s \u2013 ezek a feldolgoz\xE1s r\xE9szei. Ha nehezen viseli, k\xE9rjen pszichoonkol\xF3gust, vagy besz\xE9ljen betegcsoportban olyanokkal, akik m\xE1r t\xFAl vannak ezen.":"Hair loss is the most visible form of body image change. It's completely okay to grieve, cry, or feel angry \u2014 these are part of processing. If you're struggling, ask for a psycho-oncologist or talk to others in patient groups who've been through this.","A kemoter\xE1pia cs\xF6kkentheti a k\xF6nnytermel\xE9st, ami sz\xE1raz, viszket\u0151, \xE9g\u0151 szem\xE9rz\xE9st okoz. Ez kellemetlen, de j\xF3l kezelhet\u0151.":"Chemotherapy can reduce tear production, causing dry, itchy, burning eye sensation. This is unpleasant but well manageable.","A kemoter\xE1pia hat\xE1ssal lehet az intim \xE9let\xE9re. Cs\xF6kkenhet a libid\xF3, v\xE1ltozhat a test\xE9rz\xE9kel\xE9s, n\u0151kn\xE9l h\xFCvelysz\xE1razs\xE1g, f\xE9rfiakn\xE1l mereved\xE9si zavar l\xE9phet fel. Ezek a legt\xF6bb esetben \xE1tmenetiek.":"Chemotherapy can affect your intimate life. Libido may decrease, body perception may change, women may experience vaginal dryness, men may experience erectile dysfunction. These are usually temporary.","A kemoter\xE1pia idej\xE9n a szervezetnek extra energi\xE1ra \xE9s feh\xE9rj\xE9re van sz\xFCks\xE9ge. Nem kell k\xFCl\xF6nleges di\xE9t\xE1t tartania, de n\xE9h\xE1ny egyszer\u0171 szok\xE1s sokat seg\xEDthet.":"During chemotherapy, your body needs extra energy and protein. You don't need a special diet, but a few simple habits can help a lot.","A kemoter\xE1pia nemcsak fizikailag, hanem lelkileg is megterhel\u0151. Ez teljesen rendben van \u2013 nem kell er\u0151snek lennie minden pillanatban.":"Chemotherapy is not only physically but also emotionally demanding. This is completely okay \u2014 you don't have to be strong every moment.","A kemoter\xE1pia \u2013 k\xFCl\xF6n\xF6sen eml\u0151r\xE1k kezel\xE9s\xE9n\xE9l \u2013 cs\xF6kkentheti az \xF6sztrog\xE9nszintet, ami h\xFCvelysz\xE1razs\xE1got, irrit\xE1ci\xF3t, f\xE1jdalmas k\xF6z\xF6s\xFCl\xE9st okozhat. Ez nem tabu, \xE9s van seg\xEDts\xE9g!":"Chemotherapy \u2014 especially in breast cancer treatment \u2014 can lower estrogen levels, causing vaginal dryness, irritation, and painful intercourse. This is not taboo, and help is available!","A kemoter\xE1pi\xE1nak t\xF6bbf\xE9le c\xE9lja lehet:":"Chemotherapy can have several goals:","A kemoter\xE1pi\xE1s gy\xF3gyszerek a kezel\xE9s ut\xE1n m\xE9g 48\u201372 \xF3r\xE1ig jelen lehetnek a vizeletben, sz\xE9kletben, h\xE1nyad\xE9kban \xE9s izzads\xE1gban.":"Chemotherapy drugs may be present in urine, stool, vomit, and sweat for 48-72 hours after treatment.","A kemoter\xE1pi\xE1s gy\xF3gyszerek egy r\xE9sz\xE9n\xE9l el\u0151fordulhat allergi\xE1s vagy inf\xFAzi\xF3s reakci\xF3. Ez ijeszt\u0151en hangzik, de az orvosi csapat mindig felk\xE9sz\xFClten v\xE1rja ezeket a helyzeteket, \xE9s a legt\xF6bb reakci\xF3 gyorsan, hat\xE9konyan kezelhet\u0151. Az el\u0151medik\xE1ci\xF3 kifejezetten a kock\xE1zat cs\xF6kkent\xE9s\xE9re szolg\xE1l.":"Some chemotherapy drugs may cause allergic or infusion reactions. This sounds scary, but the medical team is always prepared, and most reactions can be managed quickly and effectively. Pre-medication is specifically designed to reduce the risk.","A kezel\xE9s alatt \xE9s ut\xE1n legal\xE1bb egy \xE9vig fogamz\xE1sg\xE1tl\xE1s k\xF6telez\u0151, mert a gy\xF3gyszerek k\xE1ros\xEDthatj\xE1k a fejl\u0151d\u0151 magzatot.":"Contraception is mandatory during and for at least one year after treatment, as the drugs can harm a developing fetus.","A kezel\xE9s alatt \xF3vszerhaszn\xE1lat aj\xE1nlott (fogamz\xE1sg\xE1tl\xE1s + partner v\xE9delme). Ha neh\xE9zs\xE9geket okoz, ne sz\xE9gyenkezzen: besz\xE9ljen orvos\xE1val vagy k\xE9rjen szexol\xF3giai tan\xE1csad\xE1st.":"Condom use is recommended during treatment (contraception + partner protection). If it causes difficulties, don't be embarrassed: talk to your doctor or seek sexual health counseling.","A kezel\xE9s befejez\xE9se ut\xE1ni id\u0151szak":"The period after treatment ends","A leggyakoribb f\xE9lelmek \u2013 \xE9s ami seg\xEDthet":"Most common fears \u2014 and what can help","A legt\xF6bb esetben \xE1tmeneti, \xE9s a kezel\xE9s v\xE9gezt\xE9vel fokozatosan javul (b\xE1r h\xF3napokig, ritk\xE1n \xE9vekig is elh\xFAz\xF3dhat).":"In most cases it's temporary and gradually improves after treatment ends (though it can persist for months, rarely years).","A legt\xF6bb onkol\xF3giai k\xF6zpontban el\xE9rhet\u0151 pszichoonkol\xF3gus, aki kifejezetten r\xE1kbetegek t\xE1mogat\xE1s\xE1ra k\xE9pzett szakember. K\xE9rje b\xE1tran a seg\xEDts\xE9g\xE9t! Betegcsoportok \xE9s \xF6nseg\xE9lyez\u0151 k\xF6r\xF6k is m\u0171k\xF6dnek. A szoci\xE1lis munk\xE1s seg\xEDthet a betegjogok \xE9s TB-\xFCgyek int\xE9z\xE9s\xE9ben.":"Most oncology centers have psycho-oncologists \u2014 specialists trained to support cancer patients. Don't hesitate to ask for help! Patient groups and self-help circles also exist. Social workers can help with patient rights and insurance matters.","A lelki oldal":"The emotional side","A r\xE1kdiagn\xF3zis \xE9s a kemoter\xE1pia olyan f\xE9lelmeket \xE9breszt, amelyekr\u0151l sokan nem mernek besz\xE9lni. Pedig ezek az \xE9rz\xE9sek teljesen norm\xE1lisak:":"A cancer diagnosis and chemotherapy awaken fears that many people don't dare talk about. Yet these feelings are completely normal:","A visszan\xF6v\xE9s gondoz\xE1sa":"Caring for regrowth","Amit szeretn\xE9nk, ha mag\xE1val vinne":"What we want you to take away","Anticip\xE1ci\xF3s h\xE1nyinger \xE9s szorong\xE1s":"Anticipatory nausea and anxiety","Az ASCO 2023-as ir\xE1nyelvei szerint a kognit\xEDv viselked\xE9ster\xE1pia (CBT) \xE9s a relax\xE1ci\xF3s technik\xE1k bizony\xEDtottan cs\xF6kkentik a kemoter\xE1pi\xE1hoz kapcsol\xF3d\xF3 szorong\xE1st. \xCDme h\xE1rom, otthon is alkalmazhat\xF3 m\xF3dszer:":"According to ASCO 2023 guidelines, cognitive behavioral therapy (CBT) and relaxation techniques are proven to reduce chemotherapy-related anxiety. Here are three methods you can use at home:","Az NCI (Nemzeti R\xE1kint\xE9zet) kutat\xE1sai szerint azok a betegek, akik akt\xEDvan r\xE9szt vesznek a kezel\xE9si d\xF6nt\xE9sekben, jobban alkalmazkodnak \xE9s kev\xE9sb\xE9 szoronganak. \xCDrja ki el\u0151re a k\xE9rd\xE9seit, \xE9s vigye mag\xE1val a vizithez! Nem kell mindet feltennie \u2013 v\xE1lassza ki, amelyek most a legfontosabbak.":"According to NCI research, patients who actively participate in treatment decisions cope better and feel less anxious. Write your questions down ahead of time and bring them to your visit! You don't have to ask all of them \u2014 pick the most important ones right now.","Az al\xE1bbi t\xFCnetek a legt\xF6bb kemoter\xE1pi\xE1s protokolln\xE1l el\u0151fordulhatnak, \xE9s nem k\xF6t\u0151dnek egyetlen konkr\xE9t gy\xF3gyszerhez. Fontos, hogy ismerje \xE9s felismerje \u0151ket.":"The following symptoms can occur with most chemotherapy regimens and are not linked to a single specific drug. It's important to know and recognize them.","Az al\xE1bbiakat javasoljuk:":"We recommend the following:","Az al\xE1bbiakban az egyes hat\xF3anyagokhoz tartoz\xF3 legfontosabb mell\xE9khat\xE1sokat mutatjuk be. Ne ijedjen meg a list\xE1t\xF3l! Nem biztos, hogy mindegyik gy\xF3gyszert kapja, \xE9s ha igen sem biztos, hogy minden mell\xE9khat\xE1s jelentkezik. Minden mell\xE9khat\xE1sn\xE1l felt\xFCntett\xFCk, melyik hat\xF3anyaghoz tartozik \u2013 \xEDgy csak az \xD6nre vonatkoz\xF3kat kell figyelnie.":"Below we present the most important side effects for each drug. Don't be alarmed by the list! You may not receive all drugs, and not all side effects will occur. We've indicated which drug each side effect belongs to \u2014 so you only need to focus on what applies to you.","Az al\xE1bbiakban megismerheti az egyes gy\xF3gyszercsoportok lehets\xE9ges mell\xE9khat\xE1sait. Ne ijedjen meg a list\xE1t\xF3l \u2013 az egyes t\xE9telekre kattintva megtudhatja, mire sz\xE1m\xEDthat, \xE9s mit tehet.":"Below you can learn about possible side effects of each drug group. Don't be alarmed by the list \u2014 click on each item to learn what to expect and what you can do.","Az orvos az \xD6n egy\xE9ni helyzete alapj\xE1n v\xE1lasztja ki, melyik hat\xF3anyagokat kapja, milyen kombin\xE1ci\xF3ban \xE9s sorrendben. K\xE9rdezze meg b\xE1tran, pontosan mit kap!":"Your doctor selects which drugs you receive based on your individual situation. Don't hesitate to ask exactly what you're getting!","B\xE1rmilyen \xE9trend-kieg\xE9sz\xEDt\u0151 szed\xE9se EL\u0150TT egyeztessen kezel\u0151orvos\xE1val!":"Consult your doctor BEFORE taking any dietary supplement!","B\u0151r, k\xF6r\xF6m \xE9s napf\xE9ny\xE9rz\xE9kenys\xE9g":"Skin, nails and sun sensitivity",B\u0151rv\u00E9delem:"Skin protection",EL\u0150TT:"BEFORE","Egyen kis adagokban, de gyakran, \xE9s v\xE1lasszon feh\xE9rjed\xFAs \xE9teleket (csirkemell, hal, toj\xE1s, t\xFAr\xF3). Igyon naponta b\u0151ven folyad\xE9kot. A gy\xF6mb\xE9res tea term\xE9szetes h\xE1nyingercsillap\xEDt\xF3. Cs\xF6kkent immunit\xE1s idej\xE9n ker\xFClje a nyers \xE9lelmiszereket \xE9s a paszt\u0151r\xF6zetlen tejterm\xE9keket.":"Eat small amounts frequently and choose protein-rich foods (chicken, fish, eggs, cottage cheese). Drink plenty of fluids daily. Ginger tea is a natural anti-nausea remedy. During weakened immunity, avoid raw foods and unpasteurized dairy.","Ez az alkalmaz\xE1s \xE1ltal\xE1nos t\xE1j\xE9koztat\xE1si c\xE9lt szolg\xE1l. Minden beteg egyedi. Ha b\xE1rmi k\xE9rd\xE9se van, forduljon bizalommal kezel\u0151orvos\xE1hoz.":"This application is for general information only. Every patient is unique. If you have any questions, please consult your doctor.","Ez teljesen norm\xE1lis \xE1tmenet. A kontrollvizsg\xE1latok rendszere \xE9ppen az\xE9rt van, hogy \xD6n \xE9s orvosa nyomon k\xF6vesse az \xE1llapot\xE1t. Ha a szorong\xE1s tart\xF3san fenn\xE1ll, a mindfulness-alap\xFA kognit\xEDv ter\xE1pia (MBCT) \xE9s az egy\xE9ni \xE9rtelem-k\xF6zpont\xFA pszichoter\xE1pia (IMCP) bizony\xEDtottan cs\xF6kkenti a ki\xFAjul\xE1st\xF3l val\xF3 f\xE9lelmet.":"This is a completely normal transition. The system of follow-up examinations exists precisely so you and your doctor can monitor your condition. If anxiety persists, mindfulness-based cognitive therapy (MBCT) and individual meaning-centered psychotherapy have been proven to reduce fear of recurrence.","FONTOS: soha ne kezdjen el \xE9trend-kieg\xE9sz\xEDt\u0151t orvosa tudta n\xE9lk\xFCl! Egyes vitaminok cs\xF6kkenthetik a kemoter\xE1pia hat\xE9konys\xE1g\xE1t.":"IMPORTANT: never start any supplement without your doctor's knowledge! Some vitamins can reduce chemotherapy effectiveness.",Fejb\u0151r\u00E1pol\u00E1s:"Scalp care","Fejh\u0171t\xE9s (scalp cooling)":"Scalp cooling","Fejkend\u0151k, turb\xE1nok":"Headscarves, turbans","Felk\xE9sz\xFCl\xE9s \u2013 amit EL\u0150TTE \xE9rdemes megtenni":"Preparation \u2014 what to do BEFOREHAND","Fesz\xEDtse meg, majd laz\xEDtsa el sorban a test\xE9t l\xE1bujjakt\xF3l a fejtet\u0151ig. Minden izomcsoportot fesz\xEDtsen 5 m\xE1sodpercig, majd laz\xEDtson 10 m\xE1sodpercig. YouTube-on sz\xE1mos magyar nyelv\u0171 vezetett gyakorlat tal\xE1lhat\xF3.":"Tense then relax your body from toes to head. Tense each muscle group for 5 seconds, then relax for 10 seconds. Many guided exercises are available on YouTube.","Fog\xE1szat \xE9s sz\xE1jhigi\xE9nia":"Dental care and oral hygiene","Fontos telefonsz\xE1mok":"Important phone numbers","Ha a kezel\xE9s k\xF6zben b\xE1rmit szokatlant \xE9rez \u2013 kipirul\xE1s, viszket\xE9s, neh\xE9zl\xE9gz\xE9s, mellkasi szor\xEDt\xE1s, sz\xE9d\xFCl\xE9s, hidegr\xE1z\xE1s \u2013 k\xE9rj\xFCk, AZONNAL sz\xF3ljon a n\u0151v\xE9rnek! Ez nem t\xFAlzott \xF3vatoss\xE1g: a szem\xE9lyzet kifejezetten k\xE9ri, hogy jelezzen, \xE9s azonnal tud seg\xEDteni.":"If you feel anything unusual during treatment \u2014 flushing, itching, difficulty breathing, chest tightness, dizziness, chills \u2014 please IMMEDIATELY tell the nurse! This is not being overly cautious: the staff specifically asks you to report anything, and can help immediately.","Ha a szorong\xE1s el\xF6nt, pr\xF3b\xE1lja a figyelm\xE9t a jelenbe horgonyozni: nevezzen meg 5 dolgot, amit l\xE1t, 4-et, amit meg\xE9rint, 3-at, amit hall, 2-t, amit \xE9rez (szag), 1-et, amit \xEDzlel.":"If anxiety overwhelms you, try anchoring your attention to the present: name 5 things you see, 4 you can touch, 3 you hear, 2 you smell, and 1 you taste.","Ha ezt tapasztalja, sz\xF3ljon orvos\xE1nak! Szorong\xE1sold\xF3 gy\xF3gyszer a kezel\xE9s el\u0151tt, relax\xE1ci\xF3s technik\xE1k \xE9s hipnoter\xE1pia bizony\xEDtottan seg\xEDtenek.":"If you experience this, tell your doctor! Anti-anxiety medication before treatment, relaxation techniques, and hypnotherapy are proven to help.","Ha gyermekei vannak, term\xE9szetes, hogy agg\xF3dik: mit mondjak nekik? A pszichoonkol\xF3giai kutat\xE1sok egy\xE9rtelm\u0171ek: a gyerekek jobban kezelik a helyzetet, ha koruknak megfelel\u0151en, \u0151szint\xE9n t\xE1j\xE9koztatj\xE1k \u0151ket.":"If you have children, it's natural to worry: what should I tell them? Psycho-oncological research is clear: children cope better when informed honestly and age-appropriately.","Ha olyan kezel\xE9st kap, amelyn\xE9l a hajhull\xE1s v\xE1rhat\xF3 (Doxorubicin, Cyclophosphamid, tax\xE1nok), akkor ez val\xF3sz\xEDn\u0171leg az egyik legjobban foglalkoztat\xF3 k\xE9rd\xE9s. Joggal. Sok n\u0151 sz\xE1m\xE1ra ez a kemoter\xE1pia legnehezebb mell\xE9khat\xE1sa \u2013 nehezebb, mint a h\xE1nyinger vagy a f\xE1radts\xE1g. Ez nem hi\xFAs\xE1g: a haj az identit\xE1sunk, a t\xFCk\xF6rk\xE9p\xFCnk r\xE9sze. Ha \xD6n is \xEDgy \xE9rez, nincs benne semmi sz\xE9gyellnival\xF3.":"If you're receiving treatment where hair loss is expected (Doxorubicin, Cyclophosphamide, taxanes), this is probably one of your biggest concerns. Understandably so. For many women, this is the hardest side effect \u2014 harder than nausea or fatigue. This isn't vanity: hair is part of our identity. If you feel this way, there's nothing to be ashamed of.","Ha reakci\xF3 t\xF6rt\xE9nik:":"If a reaction occurs:","Hajhull\xE1s \u2013 \u0151szint\xE9n, teljes k\xE9ppel":"Hair loss \u2014 honestly, the full picture","Hasznos term\xE9kek \xE9s \xE9trend-kieg\xE9sz\xEDt\u0151k":"Useful products and supplements","Hogyan seg\xEDthet a legjobban?":"How can you help best?","Hogyan \xE9rzi mag\xE1t most?":"How are you feeling right now?","Honnan fogom tudni, hogy hat\xE1sos-e?":"How will I know if it's working?","H\xE1nyinger \xE9s em\xE9szt\xE9s":"Nausea and digestion","H\xE1ztart\xE1s \xE9s mindennapi \xE9let":"Household and daily life","H\xFCvelysz\xE1razs\xE1g \xE9s intim panaszok":"Vaginal dryness and intimate issues","Jelent\u0151s megterhel\xE9st \xE9rez. K\xE9rj\xFCk, jelezze kezel\u0151orvos\xE1nak vagy k\xE9rje a pszichoonkol\xF3gus seg\xEDts\xE9g\xE9t. \xD6n nem egyed\xFCl kell, hogy megbirk\xF3zzon ezzel.":"You're experiencing significant distress. Please tell your doctor or ask for the psycho-oncologist's help. You don't have to cope with this alone.","Kedves Hozz\xE1tartoz\xF3!":"Dear Caregiver!","Kemoter\xE1pi\xE1s agyk\xF6d (Chemo Brain)":"Chemo Brain","K\xE9telye eset\xE9n is ink\xE1bb telefon\xE1ljon! Az onkol\xF3giai csapat az\xE9rt van, hogy seg\xEDtsen. Soha ne gondolja, hogy 'feleslegesen h\xEDv'.":"When in doubt, call! The oncology team is there to help. Never think you're 'calling unnecessarily'.","Lehets\xE9ges mell\xE9khat\xE1sok:":"Possible side effects:","Lelki t\xE1mogat\xE1s":"Emotional support","L\xE9legezzen be az orr\xE1n 4 m\xE1sodpercig. Tartsa bent a leveg\u0151t 7 m\xE1sodpercig. Majd lassan f\xFAjja ki a sz\xE1j\xE1n 8 m\xE1sodpercig. Ism\xE9telje 3\u20134-szer. K\xFCl\xF6n\xF6sen hasznos elalv\xE1s el\u0151tt \xE9s a kezel\u0151ben v\xE1rakozva.":"Breathe in through your nose for 4 seconds. Hold your breath for 7 seconds. Then slowly exhale through your mouth for 8 seconds. Repeat 3-4 times. Especially useful before falling asleep and while waiting in the treatment room.","L\xE9teznek megold\xE1sok: n\u0151kn\xE9l petesejt- vagy embri\xF3-fagyaszt\xE1s, f\xE9rfiakn\xE1l spermabankol\xE1s. Ezeket a kezel\xE9s megkezd\xE9se EL\u0150TT kell elv\xE9gezni.":"Solutions exist: egg or embryo freezing for women, sperm banking for men. These must be done BEFORE treatment starts.","Megel\u0151z\xE9s:":"Prevention:","Meglep\u0151, de a kezel\xE9s V\xC9GE is okozhat pszich\xE9s v\xE1ls\xE1got. Sokan \xE9rzik \xFAgy: am\xEDg kezelt\xE9k \u0151ket, addig valami t\xF6rt\xE9nt a betegs\xE9g ellen. Most mi lesz? Mi van, ha visszaj\xF6n? A szakirodalomban ezt a 'biztons\xE1gos h\xE1l\xF3 elveszt\xE9se' szindr\xF3m\xE1nak nevezik.":"Surprisingly, the END of treatment can also cause psychological crisis. Many feel: while they were being treated, something was being done against the disease. Now what? What if it comes back? In medical literature, this is called the 'loss of safety net' syndrome.","Ment\u0151k: 104 | \xC1ltal\xE1nos seg\xE9lyh\xEDv\xF3: 112":"Emergency: 911 | General emergency: 112","Mi alapj\xE1n d\xF6ntenek a kezel\xE9semr\u0151l?":"How is my treatment decided?","Mire sz\xE1m\xEDtson? Az id\u0151rend":"What to expect? The timeline","Mit hozzon mag\xE1val?":"What to bring?","Mi\xE9rt kell t\xF6bbf\xE9le gy\xF3gyszert kapnom?":"Why do I need multiple drugs?","Munka, t\xE1pp\xE9nz, jogok":"Work, sick leave, rights","M\xE9rs\xE9kelt megterhel\xE9st jelez. \xC9rdemes lehet besz\xE9lni az onkol\xF3giai csapat pszichol\xF3gus\xE1val. Ez nem gyenges\xE9g, hanem b\xF6lcsess\xE9g.":"This indicates moderate distress. It may be worth talking to the oncology team's psychologist. This isn't weakness \u2014 it's wisdom.","Nem tud seg\xEDteni, ha \xD6n maga is \xF6sszeroppan. A hozz\xE1tartoz\xF3i ki\xE9g\xE9s (caregiver burnout) komoly vesz\xE9ly.":"You can't help if you collapse yourself. Caregiver burnout is a serious risk.","Ny\xE1lkah\xE1rtya-v\xE9delem":"Mucous membrane protection",Par\u00F3k\u00E1k:"Wigs","Par\xF3k\xE1k \xE9s fejfed\u0151k":"Wigs and head coverings","Progressz\xEDv izomrelax\xE1ci\xF3 (Jacobson-f\xE9le)":"Progressive muscle relaxation (Jacobson method)","Sokan dolgoznak a kemoter\xE1pia alatt is, m\xE1sok t\xE1pp\xE9nzre mennek. Mindkett\u0151 teljesen rendben van \u2013 az \xD6n eg\xE9szs\xE9gi \xE1llapota \xE9s munkaterhel\xE9se hat\xE1rozza meg, mi a legjobb.":"Many people continue working during chemotherapy, others take sick leave. Both are perfectly fine \u2014 your health condition and workload determine what's best.",Szemsz\u00E1razs\u00E1g:"Dry eyes","Szem\xF6ld\xF6k \xE9s szempilla":"Eyebrows and eyelashes","Szexualit\xE1s \xE9s intimit\xE1s":"Sexuality and intimacy","Szorong\xE1scs\xF6kkent\u0151 technik\xE1k":"Anxiety-reducing techniques","Szteroid mell\xE9khat\xE1sok, egy\xE9ni gy\xF3gyszerprofilok":"Steroid side effects, individual drug profiles","Term\xE9kenys\xE9g \xE9s csal\xE1dtervez\xE9s":"Fertility and family planning","Testfolyad\xE9kok \xE9s biztons\xE1g otthon":"Body fluids and safety at home","Testmozg\xE1s a kezel\xE9s alatt":"Exercise during treatment","Tipp: Vigyen mag\xE1val egy f\xFCzetet vagy haszn\xE1lja telefonja jegyzet\xE9t. K\xE9rje meg k\xEDs\xE9r\u0151j\xE9t, hogy jegyzeteljen \u2013 az orvosi besz\xE9lget\xE9s ut\xE1n sokszor neh\xE9z mindent felid\xE9zni. Nem kell mindet feltennie egyszerre \u2013 a k\xF6vetkez\u0151 vizitre is vihet k\xE9rd\xE9seket!":"Tip: Bring a notebook or use your phone's notes. Ask your companion to take notes \u2014 it's often hard to remember everything after talking with the doctor. You don't have to ask everything at once \u2014 you can bring questions to the next visit too!","Translating... / Ford\xEDt\xE1s...":"Translating...","T\xE1pl\xE1lkoz\xE1s a kezel\xE9s alatt":"Nutrition during treatment","T\xF6bb kemoter\xE1pi\xE1s szer fokozza a b\u0151r f\xE9ny\xE9rz\xE9kenys\xE9g\xE9t, \xE9s okozhat b\u0151rsz\xE1razs\xE1got, s\xF6t\xE9ted\xE9st, k\xF6r\xF6mt\xF6r\xE9st, k\xF6r\xF6msz\xEDn-v\xE1ltoz\xE1st. Ezek t\xF6bbnyire \xE1tmeneti t\xFCnetek.":"Several chemotherapy drugs increase skin sun sensitivity and can cause dry skin, darkening, nail breakage, and nail color changes. These are mostly temporary symptoms.","T\xFCnetek:":"Symptoms:","Vigy\xE1zzon mag\xE1ra is!":"Take care of yourself too!","a f\xE1radts\xE1got, a szorong\xE1st, a depresszi\xF3t \xE9s a kognit\xEDv roml\xE1st kemoter\xE1pia alatt. A legt\xF6bb beteg sz\xE1m\xE1ra a napi 20\u201330 perces m\xE9rs\xE9kelt testmozg\xE1s (s\xE9ta, j\xF3ga, \xFAsz\xE1s) biztons\xE1gos \xE9s javasolt.":"fatigue, anxiety, depression, and cognitive decline during chemotherapy. For most patients, 20-30 minutes of moderate daily exercise (walking, yoga, swimming) is safe and recommended.","a haj a kezel\xE9s befejez\xE9se ut\xE1n MINDIG visszan\u0151":"hair ALWAYS grows back after treatment ends","bizony\xEDtottan cs\xF6kkenti":"is proven to reduce","felt\xE9tlen\xFCl besz\xE9lje meg kezel\u0151orvos\xE1val a kemoter\xE1pia megkezd\xE9se EL\u0150TT":"definitely discuss with your doctor BEFORE starting chemotherapy","meghaladja a beteg\xE9t":"exceeds the patient's","val\xF3s, orvosi jelens\xE9g":"a real, medical phenomenon","\xC9trend-kieg\xE9sz\xEDt\u0151k (CSAK orvosi egyeztet\xE9ssel!)":"Supplements (ONLY with doctor approval!)","\xCDrja ide a kezel\u0151int\xE9zet telefonsz\xE1m\xE1t: ____________________":"Write your treatment center's phone number here: ____________________","\xDAgy t\u0171nik, most viszonylag j\xF3l b\xEDrja a megterhel\xE9st. Ha b\xE1rmikor v\xE1ltozna, ne habozzon seg\xEDts\xE9get k\xE9rni.":"It seems you're coping relatively well right now. If this changes at any time, don't hesitate to ask for help.","\xE9rdemes fog\xE1szati sz\u0171r\u0151vizsg\xE1latot v\xE9geztetni. A cs\xF6kkent feh\xE9rv\xE9rsejtsz\xE1m idej\xE9n a fog\xE1szati beavatkoz\xE1s fert\u0151z\xE9svesz\xE9lyes lehet.":"it's advisable to have a dental check-up. During low white blood cell counts, dental procedures can pose infection risk.","\u2013 m\xE9gis ritk\xE1n kapnak t\xE1mogat\xE1st. Ez a szekci\xF3 \xD6nnek k\xE9sz\xFClt.":" \u2014 yet they rarely receive support. This section was made for you.","Az al\xE1bbiakban megismerheti az egyes gy\xF3gyszercsoportok lehets\xE9ges mell\xE9khat\xE1sait. Ne ijedjen meg a list\xE1t\xF3l! Nem biztos, hogy mindegyik jelentkezni fog, \xE9s a legt\xF6bb j\xF3l kezelhet\u0151. A pontos adagol\xE1st minden esetben az \xD6n orvosa hat\xE1rozza meg.":"Below you can learn about possible side effects of each drug group. Don't be alarmed by the list! Not all of them will necessarily occur, and most are well manageable. Exact dosing is always determined by your doctor.","M\xE9rs\xE9kelt megterhel\xE9st jelez. \xC9rdemes lehet besz\xE9lni az onkol\xF3giai csapat pszichol\xF3gus\xE1val. Ez nem gyenges\xE9g jele \u2013 hanem b\xF6lcs d\xF6nt\xE9s.":"This indicates moderate distress. It may be worth talking to the oncology team's psychologist. This is not a sign of weakness \u2014 it's a wise decision.","Jelent\u0151s megterhel\xE9st \xE9rez. K\xE9rj\xFCk, jelezze kezel\u0151orvos\xE1nak vagy k\xE9rje a pszichoonkol\xF3gus seg\xEDts\xE9g\xE9t. \xD6n meg\xE9rdemli a t\xE1mogat\xE1st \u2013 \xE9s van seg\xEDts\xE9g.":"You're experiencing significant distress. Please tell your doctor or ask for the psycho-oncologist's help. You deserve support \u2014 and help is available.","A r\xE1kdiagn\xF3zis \xE9s a kemoter\xE1pia olyan f\xE9lelmeket \xE9breszt, amelyekr\u0151l sokan nem mernek besz\xE9lni. Pedig ezek az \xE9rz\xE9sek teljesen norm\xE1lisak, \xE9s a pszichoonkol\xF3giai kutat\xE1sok szerint puszt\xE1n a kimond\xE1suk is cs\xF6kkenti a szorong\xE1st. Az al\xE1bbiakban felsoroljuk a leggyakoribbakat:":"A cancer diagnosis and chemotherapy awaken fears that many people don't dare talk about. Yet these feelings are completely normal, and psycho-oncological research shows that simply voicing them reduces anxiety. Below are the most common ones:","Az ASCO 2023-as ir\xE1nyelvei szerint a kognit\xEDv viselked\xE9ster\xE1pia (CBT) \xE9s a relax\xE1ci\xF3s technik\xE1k bizony\xEDtottan cs\xF6kkentik a kemoter\xE1pi\xE1hoz kapcsol\xF3d\xF3 szorong\xE1st. \xCDme h\xE1rom technika, amelyet ak\xE1r most, ak\xE1r a kezel\u0151sz\xE9kben is alkalmazhat:":"According to ASCO 2023 guidelines, cognitive behavioral therapy (CBT) and relaxation techniques are proven to reduce chemotherapy-related anxiety. Here are three techniques you can use right now or in the treatment chair:","L\xE9legezzen be az orr\xE1n 4 m\xE1sodpercig. Tartsa bent a leveg\u0151t 7 m\xE1sodpercig. Majd lassan f\xFAjja ki a sz\xE1j\xE1n 8 m\xE1sodpercig. Ism\xE9telje meg 3-4-szer. Ez a technika aktiv\xE1lja a paraszimpatikus idegrendszert \xE9s m\xE9rhet\u0151 m\xF3don cs\xF6kkenti a szorong\xE1st.":"Breathe in through your nose for 4 seconds. Hold your breath for 7 seconds. Then slowly exhale through your mouth for 8 seconds. Repeat 3-4 times. This technique activates the parasympathetic nervous system and measurably reduces anxiety.","Fesz\xEDtse meg, majd laz\xEDtsa el sorban a test\xE9t l\xE1bujjakt\xF3l a fejtet\u0151ig. Minden izomcsoportot fesz\xEDtsen 5 m\xE1sodpercig, majd engedje el 10 m\xE1sodpercig. K\xF6zben figyelje a fesz\xFClts\xE9g \xE9s az ellazul\xE1s k\xF6z\xF6tti k\xFCl\xF6nbs\xE9get. Ez a m\xF3dszer k\xFCl\xF6n\xF6sen hat\xE1sos a kezel\xE9s el\u0151tti v\xE1rakoz\xE1sban.":"Tense then relax your body from toes to head. Tense each muscle group for 5 seconds, then release for 10 seconds. Notice the difference between tension and relaxation. This method is especially effective while waiting before treatment.","Ha a szorong\xE1s el\xF6nt, pr\xF3b\xE1lja a figyelm\xE9t a jelenbe horgonyozni: nevezzen meg 5 dolgot, amit l\xE1t, 4-et, amit hall, 3-at, amit \xE9rint, 2-t, amit szagol, \xE9s 1-et, amit \xEDzlel. Ez a technika seg\xEDt kil\xE9pni a f\xE9lelem spir\xE1lj\xE1b\xF3l.":"If anxiety overwhelms you, try anchoring your attention to the present: name 5 things you see, 4 you hear, 3 you can touch, 2 you smell, and 1 you taste. This technique helps break out of the spiral of fear.","A betegek mintegy 25-30%-\xE1n\xE1l a t\xF6bbsz\xF6ri kezel\xE9s ut\xE1n klasszikus kondicion\xE1l\xF3d\xE1s alakulhat ki: m\xE1r a k\xF3rh\xE1z szag\xE1t\xF3l, a kezel\u0151sz\xE9k l\xE1tv\xE1ny\xE1t\xF3l, s\u0151t ak\xE1r a k\xF3rh\xE1zba vezet\u0151 \xFAtt\xF3l is rosszull\xE9t, h\xE1nyinger vagy szorong\xE1s l\xE9phet fel. Ez nem k\xE9pzel\u0151d\xE9s \u2013 val\xF3s, j\xF3l dokument\xE1lt jelens\xE9g.":"In about 25-30% of patients, after multiple treatments, classical conditioning can develop: just the hospital smell, sight of the treatment chair, or even the road to the hospital can trigger nausea or anxiety. This is not imagination \u2014 it's a real, well-documented phenomenon.","Ha ezt tapasztalja, sz\xF3ljon orvos\xE1nak! Szorong\xE1sold\xF3 gy\xF3gyszer a kezel\xE9s el\u0151tt, relax\xE1ci\xF3s technik\xE1k \xE9s szisztematikus deszenzitiz\xE1l\xE1s seg\xEDthetnek. Sokan sz\xE1molnak be arr\xF3l, hogy zenehallgat\xE1s, ir\xE1ny\xEDtott vizualiz\xE1ci\xF3 vagy ak\xE1r kellemes illat\xFA kr\xE9m az orruk alatt cs\xF6kkenti a t\xFCneteket.":"If you experience this, tell your doctor! Anti-anxiety medication before treatment, relaxation techniques, and systematic desensitization can help. Many patients report that listening to music, guided visualization, or even pleasant-scented cream under their nose reduces symptoms.","Meglep\u0151, de a kezel\xE9s V\xC9GE is okozhat pszich\xE9s v\xE1ls\xE1got. Sokan \xE9rzik \xFAgy: am\xEDg kezelt\xE9k \u0151ket, addig valami t\xF6rt\xE9nt a betegs\xE9g ellen. Most mi lesz? Mi van, ha visszaj\xF6n? A szakirodalomban ezt a 'biztons\xE1gos h\xE1l\xF3 elveszt\xE9se' szindr\xF3m\xE1nak nevezik.":"Surprisingly, the END of treatment can also cause psychological crisis. Many feel: while being treated, something was being done against the disease. Now what? What if it comes back? In medical literature, this is called the 'loss of safety net' syndrome.","A legt\xF6bb esetben \xE1tmeneti, \xE9s a kezel\xE9s v\xE9gezt\xE9vel fokozatosan javul (b\xE1r h\xF3napokig, ritk\xE1n \xE9vekig is elh\xFAz\xF3dhat). Amit tehet:":"In most cases it's temporary and gradually improves after treatment ends (though it can persist for months, rarely years). What you can do:","a f\xE1radts\xE1got, a szorong\xE1st, a depresszi\xF3t \xE9s a kognit\xEDv roml\xE1st kemoter\xE1pia alatt. A legt\xF6bb beteg azt gondolja, pihennie kell \u2013 pedig \xE9ppen a mozg\xE1s seg\xEDt a legt\xF6bbet.":"fatigue, anxiety, depression, and cognitive decline during chemotherapy. Most patients think they need to rest \u2014 but exercise actually helps the most.","Sokan dolgoznak a kemoter\xE1pia alatt is, m\xE1sok t\xE1pp\xE9nzre mennek. Mindkett\u0151 teljesen rendben van \u2013 az \xD6n d\xF6nt\xE9se \xE9s \xE1llapota hat\xE1rozza meg.":"Many people continue working during chemotherapy, others take sick leave. Both are perfectly fine \u2014 your decision and condition determine what's best.","Nem tud seg\xEDteni, ha \xD6n maga is \xF6sszeroppan. A hozz\xE1tartoz\xF3i ki\xE9g\xE9s (caregiver burnout) komoly vesz\xE9ly. Jelei: \xE1lland\xF3 f\xE1radts\xE1g, ingerl\xE9kenys\xE9g, alv\xE1szavar, a saj\xE1t eg\xE9szs\xE9g elhanyagol\xE1sa, b\u0171ntudat, ha b\xE1rmib\u0151l \xF6r\xF6met \xE9rez.":"You can't help if you collapse yourself. Caregiver burnout is a serious risk. Signs: constant fatigue, irritability, sleep problems, neglecting your own health, guilt when feeling any joy.","Ha gyermekei vannak, term\xE9szetes, hogy agg\xF3dik: mit mondjak nekik? A pszichoonkol\xF3giai kutat\xE1sok egy\xE9rtelm\u0171ek: a gyermekek mindig \xE9rzik, hogy valami nincs rendben, m\xE9g ha nem is mondj\xE1k. A titkol\xE1s \xE1ltal\xE1ban t\xF6bb szorong\xE1st okoz, mint a korhoz igaz\xEDtott, \u0151szinte t\xE1j\xE9koztat\xE1s.":"If you have children, it's natural to worry: what should I tell them? Psycho-oncological research is clear: children always sense when something is wrong, even if they don't say so. Keeping secrets usually causes more anxiety than honest, age-appropriate information.","K\xE9telye eset\xE9n is ink\xE1bb telefon\xE1ljon! Az onkol\xF3giai csapat az\xE9rt van, hogy seg\xEDtsen. Soha ne gondolja, hogy t\xFAlzottan \xF3vatos \u2013 jobb egyszer t\xF6bbet sz\xF3lni, mint egyszer kevesebbet.":"When in doubt, call! The oncology team is there to help. Never think you're being overly cautious \u2014 it's better to call once too many than once too few.","A Bevacizumab egyik leggyakoribb mell\xE9khat\xE1sa. Rendszeres ellen\u0151rz\xE9s sz\xFCks\xE9ges, sz\xFCks\xE9g eset\xE9n v\xE9rnyom\xE1scs\xF6kkent\u0151 gy\xF3gyszerrel kezelhet\u0151.":"One of Bevacizumab's most common side effects. Regular monitoring needed, manageable with blood pressure medication if necessary.","A Bevacizumab lass\xEDtja a sebgy\xF3gyul\xE1st. Ez\xE9rt m\u0171t\xE9t el\u0151tt id\u0151ben le kell \xE1ll\xEDtani, \xE9s ut\xE1na csak a seb gy\xF3gyul\xE1sa ut\xE1n ind\xEDthat\xF3 \xFAjra.":"Bevacizumab slows wound healing. It must be stopped well before surgery, and restarted only after the wound has healed.","A Bevacizumab nem klasszikus kemoter\xE1pia, hanem c\xE9lzott (biol\xF3giai) ter\xE1pia. Az \xE9r\xFAjdonk\xE9pz\u0151d\xE9st g\xE1tolja (anti-VEGF), ezzel a daganat v\xE9rell\xE1t\xE1s\xE1t cs\xF6kkenti. Inf\xFAzi\xF3ban kapja, gyakran kemoter\xE1pi\xE1s szerekkel egy\xFCtt. A mell\xE9khat\xE1s-profilja elt\xE9r a hagyom\xE1nyos kemoter\xE1pi\xE1\xE9t\xF3l \u2013 NEM okoz hajhull\xE1st, h\xE1nyingert vagy csontvel\u0151-szuppresszi\xF3t.":"Bevacizumab is not classical chemotherapy but targeted (biological) therapy. It inhibits new blood vessel formation (anti-VEGF), reducing tumor blood supply. Given by infusion, often with chemotherapy. Its side effect profile differs from traditional chemo \u2014 does NOT cause hair loss, nausea, or bone marrow suppression.","A Bleomycin a t\xFCd\u0151sz\xF6vetet k\xE1ros\xEDthatja, ami legrosszabb esetben fibr\xF3zishoz (hegesed\xE9shez) vezethet. Ez\xE9rt a t\xFCd\u0151funkci\xF3t rendszeresen m\xE9rik, \xE9s ha romlik, a Bleomycint azonnal elhagyj\xE1k.":"Bleomycin can damage lung tissue, which in worst case can lead to fibrosis (scarring). Lung function is measured regularly, and if it worsens, Bleomycin is immediately discontinued.","A Bleomycin egyed\xFCl\xE1ll\xF3 hat\xE1smechanizmus\xFA szer, amelyet els\u0151sorban herer\xE1k kezel\xE9s\xE9ben alkalmaznak. Legfontosabb saj\xE1toss\xE1ga, hogy szinte nem hat a csontvel\u0151re (ez\xE9rt nem okoz v\xE9rk\xE9p-roml\xE1st), viszont a t\xFCd\u0151sz\xF6vetre toxikus lehet. Emiatt a t\xFCd\u0151funkci\xF3 rendszeres ellen\u0151rz\xE9se K\xD6TELEZ\u0150, \xE9s a kezel\xE9s befejez\xE9se ut\xE1n is van betartand\xF3 szab\xE1ly.":"Bleomycin has a unique mechanism of action, primarily used in testicular cancer treatment. Its most important feature is that it barely affects bone marrow (doesn't cause blood count drops), but can be toxic to lung tissue. That's why regular lung function monitoring is MANDATORY, and there are rules to follow even after treatment ends.","A Bleomycin-bead\xE1s ut\xE1n n\xE9h\xE1ny \xF3r\xE1val enyhe l\xE1z, hidegr\xE1z\xE1s jelentkezhet. Ez NEM fert\u0151z\xE9s \xE9s NEM allergia, hanem a szer hat\xE1sa.":"A few hours after Bleomycin administration, mild fever and chills may occur. This is NOT infection and NOT allergy, but the drug's effect.","A Bleomycin-injekci\xF3 napj\xE1n":"On Bleomycin injection day","A Cisplatin k\xE1ros\xEDthatja a bels\u0151 f\xFCl \xE9rz\xE9kel\u0151 sejtjeit. Ez \xE1ltal\xE1ban magas hangok hall\xE1s\xE1nak roml\xE1s\xE1val \xE9s f\xFClz\xFAg\xE1ssal kezd\u0151dik. A korai jelz\xE9s k\xFCl\xF6n\xF6sen fontos.":"Cisplatin can damage the sensory cells of the inner ear. This typically starts with worsening high-frequency hearing and tinnitus. Early reporting is especially important.","A DPD nev\u0171 enzim felel\u0151s az 5-FU lebont\xE1s\xE1\xE9rt a szervezetben. Ha ez az enzim hi\xE1nyos, a szok\xE1sos adag is s\xFAlyos mell\xE9khat\xE1st okozhat. EZ\xC9RT a vizsg\xE1lat K\xD6TELEZ\u0150 az els\u0151 5-FU bead\xE1s EL\u0150TT!":"The DPD enzyme is responsible for breaking down 5-FU in the body. If this enzyme is deficient, even the standard dose can cause severe side effects. THAT'S WHY testing is MANDATORY before the first 5-FU dose!","A Doxorubicin a sz\xEDvizom sejtjeit is \xE9rintheti. Ez\xE9rt van egy orvos \xE1ltal meghat\xE1rozott maxim\xE1lis \xF6sszd\xF3zis, \xE9s a sz\xEDv m\u0171k\xF6d\xE9s\xE9t rendszeresen ellen\u0151rzik ultrahanggal.":"Doxorubicin can affect heart muscle cells. That's why there's a doctor-determined maximum cumulative dose, and heart function is regularly monitored with ultrasound.","A Gemcitabin antimetabolit t\xEDpus\xFA kemoter\xE1pi\xE1s szer, amelyet els\u0151sorban hasny\xE1lmirigy- \xE9s t\xFCd\u0151r\xE1k kezel\xE9s\xE9ben alkalmaznak. \xC1ltal\xE1ban j\xF3l toler\xE1lhat\xF3 \u2013 a mell\xE9khat\xE1sai t\xF6bbnyire enyh\xE9bbek, mint m\xE1s kemoter\xE1pi\xE1s szerek\xE9.":"Gemcitabine is an antimetabolite-type chemotherapy drug primarily used in pancreatic and lung cancer treatment. Generally well tolerated \u2014 its side effects are usually milder than other chemotherapy drugs.","A Rituximab az immunrendszer fontos sejtjeit \xE9rinti, amelyek a k\xFAra lez\xE1rulta ut\xE1n is h\xF3napokig alacsony szinten maradhatnak. Ez azt jelenti, hogy fokozottan figyelni kell a fert\u0151z\xE9sekre, m\xE9g j\xF3val a k\xFAra befejez\xE9se ut\xE1n is.":"Rituximab affects important immune system cells that may remain at low levels for months after the course ends. This means you need to be extra vigilant about infections, even well after treatment.","A Rituximab c\xE9lzottan a B-limfocit\xE1k feh\xE9rj\xE9j\xE9hez k\xF6t\u0151dik. Ez nem klasszikus kemoter\xE1pia, hanem c\xE9lzott biol\xF3giai ter\xE1pia. Az els\u0151 bead\xE1skor az inf\xFAzi\xF3s reakci\xF3 gyakori, de ne ijedjen meg: a legt\xF6bb eset enyhe \xE9s j\xF3l kezelhet\u0151.":"Rituximab specifically binds to a protein on B-lymphocytes. This is not classical chemotherapy but targeted biological therapy. Infusion reactions are common at first, but don't be alarmed: most cases are mild and manageable.","A bead\xE1s ut\xE1ni napokban \xEDz\xFCleti \xE9s izomf\xE1jdalmat \xE9rezhet, mintha influenz\xE1s lenne. Ez kellemetlen, de \xE1ltal\xE1ban n\xE9h\xE1ny nap alatt elm\xFAlik.":"In the days after infusion, you may experience joint and muscle pain as if you had the flu. This is unpleasant but usually resolves within a few days.","A csapat felk\xE9sz\xFClt \xE9s azonnal tud seg\xEDteni":"The team is prepared and can help immediately","A feh\xE9rv\xE9rsejtek cs\xF6kken\xE9se fokozza a fert\u0151z\xE9svesz\xE9lyt.":"White blood cell decrease increases infection risk.","A feh\xE9rv\xE9rsejtek \xE9s v\xE9rlemezk\xE9k cs\xF6kkenhetnek.":"White blood cells and platelets may decrease.","A gyomorv\xE9d\u0151t az orvos \xE1ltal javasolt m\xF3don szedje":"Take the stomach protector as advised by your doctor","A hajhull\xE1s lelkileg az egyik legnehezebb mell\xE9khat\xE1s, \xE9s teljesen \xE9rthet\u0151, ha nagyon b\xE1ntja. Amit biztosan tudhat: a haj MINDIG visszan\u0151 a kezel\xE9s v\xE9gezt\xE9vel. A Tan\xE1csok szekci\xF3ban r\xE9szletes \xFAtmutat\xF3t tal\xE1l a fejh\u0171t\xE9sr\u0151l, par\xF3k\xE1kr\xF3l, fejb\u0151r\xE1pol\xE1sr\xF3l \xE9s a visszan\xF6v\xE9sr\u0151l.":"Hair loss is one of the emotionally hardest side effects, and it's completely understandable if it upsets you greatly. Wha
