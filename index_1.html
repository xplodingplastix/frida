t you can know for certain: hair ALWAYS grows back after treatment. You'll find detailed guidance in the Tips section on scalp cooling, wigs, scalp care, and regrowth.","A h\xE1ny\xE1scsillap\xEDt\xF3t \xDCTEMEZETTEN szedje, m\xE9g ha j\xF3l is \xE9rzi mag\xE1t!":"Take anti-nausea medication ON SCHEDULE, even if you feel fine!","A kemoter\xE1pia a b\xE9lny\xE1lkah\xE1rtya gyorsan oszt\xF3d\xF3 sejtjeit is \xE9rinti. A legt\xF6bb esetben enyhe \xE9s kezelhet\u0151, de s\xFAlyos esetben kisz\xE1rad\xE1st okozhat.":"Chemotherapy affects the rapidly dividing cells of the intestinal lining. In most cases it's mild and manageable, but severe cases can cause dehydration.","A kezel\xE9s BEFEJEZ\xC9SE UT\xC1N is \xE9lethosszig figyelni kell: B\xDAV\xC1RKOD\xC1S TILOS! Magas oxig\xE9nkoncentr\xE1ci\xF3 (altat\xE1s!) \xE9lvesz\xE9lyes lehet!":"AFTER treatment ends, lifelong awareness needed: SCUBA DIVING IS PROHIBITED! High oxygen concentration (anesthesia!) can be life-threatening!","A kezel\xE9s alatt, fokozatosan":"During treatment, gradually","A kezel\xE9s el\u0151rehaladt\xE1val":"As treatment progresses","A kezel\xE9s napj\xE1n vagy m\xE1snap":"On treatment day or the next day","A kezel\xE9s napj\xE1t\xF3l kezd\u0151d\u0151en":"Starting from treatment day","A kezel\xE9s ut\xE1n n\xE9h\xE1ny nappal":"A few days after treatment","A kezel\xE9s ut\xE1ni 1\u20132 napban":"1-2 days after treatment","A kezel\xE9s ut\xE1ni napokban":"In the days after treatment","A kezel\xE9s ut\xE1ni napokban (jellemz\u0151en 3\u201310 nap m\xFAlva)":"In the days after treatment (typically 3-10 days later)","A kezel\xE9s ut\xE1ni napokban NE igyon hideget, NE egyen jeget, NE ny\xFAljon hideg t\xE1rgyakhoz!":"In the days after treatment, do NOT drink cold beverages, eat ice, or touch cold objects!","A k\xE9sleltetett h\xE1nyinger (2\u20135. nap) er\u0151sebb lehet, mint a kezel\xE9s napj\xE1n!":"Delayed nausea (days 2-5) can be stronger than on treatment day!","A k\xE9zujjakban, l\xE1bujjakban zsibbad\xE1st, bizserg\xE9st \xE9rezhet, ami ciklusr\xF3l ciklusra fokoz\xF3dhat. Enn\xE9l a mell\xE9khat\xE1sn\xE1l a korai jelz\xE9s k\xFCl\xF6n\xF6sen fontos, mert a kezel\xE9s m\xF3dos\xEDt\xE1s\xE1val megel\u0151zhet\u0151 a s\xFAlyosbod\xE1s.":"You may feel numbness and tingling in your fingers and toes that can worsen cycle by cycle. Early reporting is especially important for this side effect, as treatment modification can prevent worsening.","A m\xE1sodik alkalomt\xF3l a kezel\xE9s \xE1ltal\xE1ban sokkal r\xF6videbb":"From the second time, treatment is usually much shorter","A panasz a k\xFAra v\xE9gezt\xE9vel \xE1ltal\xE1ban javul, de h\xF3napokig fenn\xE1llhat":"Symptoms usually improve after the course but may persist for months","A platinaalap\xFA szerek a r\xE1kos sejtek DNS-\xE9hez k\xF6t\u0151dve akad\xE1lyozz\xE1k szaporod\xE1sukat. Nagyon hat\xE9konyak, de n\xE9h\xE1ny fontos mell\xE9khat\xE1suk van, amelyekre \xE9rdemes felk\xE9sz\xFClni.":"Platinum-based drugs bind to cancer cell DNA, preventing their multiplication. They are very effective but have some important side effects worth preparing for.","A rendszeres ellen\u0151rz\xE9s biztons\xE1goss\xE1 teszi a kezel\xE9st":"Regular monitoring makes the treatment safe","A szer az erekre hat, ami fokozhatja a v\xE9rz\xE9sk\xE9szs\xE9get.":"The drug affects blood vessels, which may increase bleeding tendency.","A szteroid gyeng\xEDti az immunrendszert, \xE9s ami m\xE9g fontosabb: ELFEDI a l\xE1z t\xFCneteit. Ez azt jelenti, hogy fert\u0151z\xE9s eset\xE9n lehet, hogy nem lesz l\xE1za, holott s\xFAlyos a helyzet.":"Steroids weaken the immune system, and more importantly: MASK fever symptoms. During an infection you may not have a fever even though the situation is serious.","A szteroid irrit\xE1lhatja a gyomor ny\xE1lkah\xE1rty\xE1j\xE1t. Emiatt orvosa gyomorv\xE9d\u0151t is fel\xEDr mell\xE9.":"Steroids can irritate the stomach lining. That's why your doctor will also prescribe stomach protection.","A szteroid szed\xE9se napjain":"On steroid days","A szteroidok \xE1tmeneti v\xE9rcukor-emelked\xE9st okozhatnak m\xE9g azokn\xE1l is, akik nem cukorbetegek. Ez \xE1ltal\xE1ban a szteroid elhagy\xE1sa ut\xE1n rendez\u0151dik, de figyelni kell r\xE1.":"Steroids can cause temporary blood sugar elevation even in non-diabetics. This usually normalizes after stopping, but needs monitoring.","A sz\xE1j ny\xE1lkah\xE1rty\xE1ja \xE9rz\xE9kenny\xE9, piross\xE1 v\xE1lhat. Ez kellemetlen, de t\xF6bbnyire kezelhet\u0151 \xE9s fokozatosan javul.":"The mouth lining may become sensitive and red. This is unpleasant but usually manageable and gradually improves.","A sz\xEDv ultrahangos vizsg\xE1lata a kezel\xE9s el\u0151tt \xE9s k\xF6zben rendszeresen megt\xF6rt\xE9nik":"Cardiac ultrasound is performed regularly before and during treatment","A tablett\xE1t mindig REGGEL vegye be, soha nem este!":"Always take the tablet in the MORNING, never at night!","A tax\xE1nok a sejtoszt\xF3d\xE1s g\xE1tl\xE1s\xE1val hatnak, \xE9s t\xF6bb r\xE1kt\xEDpus kezel\xE9s\xE9ben alapvet\u0151 gy\xF3gyszerek. N\xE9h\xE1ny mell\xE9khat\xE1suk id\u0151vel felhalmoz\xF3dik, ez\xE9rt nagyon fontos a korai jelz\xE9s.":"Taxanes work by inhibiting cell division and are fundamental drugs in treating several cancer types. Some side effects accumulate over time, making early reporting especially important.","A tenyereken \xE9s talpakon b\u0151rp\xEDr, duzzad\xE1s, h\xE1ml\xE1s, f\xE1jdalom jelentkezhet.":"Redness, swelling, peeling, and pain may appear on palms and soles.","A t\xFCnet ciklusr\xF3l ciklusra er\u0151s\xF6dhet \u2013 sz\xE1moljon be orvos\xE1nak, hogyan alakul":"Symptoms may worsen cycle by cycle \u2014 report to your doctor how it's progressing","A t\xFCnet \xE1tmeneti \u2013 a szteroid befejez\xE9se ut\xE1n normaliz\xE1l\xF3dik":"The symptom is temporary \u2014 normalizes after stopping steroids","A vizeletben feh\xE9rje jelenhet meg \u2013 rendszeres vizeletvizsg\xE1lattal ellen\u0151rzik.":"Protein may appear in urine \u2014 monitored with regular urine tests.","Akupressz\xFAr\xE1s csukl\xF3p\xE1nt (Sea-Band) \u2013 gy\xF3gyszert\xE1rban kaphat\xF3, sok beteg hasznosnak tal\xE1lja":"Acupressure wristband (Sea-Band) \u2014 available at pharmacies, many patients find it helpful","Allergi\xE1s reakci\xF3":"Allergic reaction","An\xE1lis ter\xFClet v\xE9delme: cinkoxidos kr\xE9m":"Protect the anal area: zinc oxide cream","Arc puffad\xE1sa":"Facial puffiness","Atropin-injekci\xF3 azonnal seg\xEDt \u2013 a csapat felk\xE9sz\xFClten tartja k\xE9szenl\xE9tben":"Atropine injection helps immediately \u2014 the team keeps it ready","Az Irinotecan hat\xE9kony kemoter\xE1pi\xE1s szer, amelyet els\u0151sorban hasny\xE1lmirigy- \xE9s vastagb\xE9lr\xE1k kezel\xE9s\xE9ben alkalmaznak. Egyedi jellemz\u0151je, hogy K\xC9TF\xC9LE hasmen\xE9st okozhat, amelyeket K\xDCL\xD6NB\xD6Z\u0150EN kell kezelni \u2013 ezt fontos meg\xE9rteni!":"Irinotecan is an effective chemotherapy drug primarily used in pancreatic and colorectal cancer treatment. Its unique feature is that it can cause TWO TYPES of diarrhea that must be treated DIFFERENTLY \u2014 understanding this is important!","Az egyik leger\u0151sebb \xE9s leghat\xE9konyabb kemoter\xE1pi\xE1s szer. Piros sz\xEDne miatt n\xE9ha v\xF6r\xF6s \xF6rd\xF6gnek is nevezik a betegek \u2013 de ne ijedjen meg, egyszer\u0171en ilyen a gy\xF3gyszer sz\xEDne! Legfontosabb mell\xE9khat\xE1sa a sz\xEDvre gyakorolt hat\xE1s, amelyet rendszeres sz\xEDv-ultrahanggal ellen\u0151riznek.":"One of the most powerful and effective chemotherapy drugs. Patients sometimes call it the 'red devil' because of its red color \u2014 but don't be frightened, that's simply the drug's color! Its most important side effect is cardiac impact, monitored with regular cardiac ultrasound.","Az els\u0151 alkalommal a betegek jelent\u0151s r\xE9sz\xE9n\xE9l el\u0151fordul valamilyen reakci\xF3. De miel\u0151tt megijedne: ezek t\xF6bbnyire enyh\xE9k \u2013 hidegr\xE1z\xE1s, enyhe l\xE1z, b\u0151rviszket\xE9s. S\xFAlyos reakci\xF3 ritka. \xC9ppen ez\xE9rt az els\u0151 bead\xE1sn\xE1l nagyon lassan ind\xEDtj\xE1k az inf\xFAzi\xF3t, \xE9s az orvosi csapat folyamatosan figyeli \xD6nt. Ha az els\u0151 kezel\xE9s rendben zajlik, a tov\xE1bbiakban m\xE1r j\xF3val gyorsabban adhat\xF3.":"During the first administration, a significant proportion of patients experience some reaction. But don't worry: these are mostly mild \u2014 chills, mild fever, skin itching. Severe reactions are rare. That's why the first infusion is started very slowly, and the team continuously monitors you. If the first treatment goes smoothly, subsequent ones can be given much faster.","Az els\u0151 alkalommal sz\xE1m\xEDtson hosszabb kezel\xE9si napra \u2013 hozzon k\xF6nyvet, zen\xE9t!":"Expect a longer treatment day the first time \u2014 bring a book, music!","Az els\u0151 bead\xE1s lass\xFA, fokozott fel\xFCgyelet mellett t\xF6rt\xE9nik":"First infusion is slow, under close supervision","Az els\u0151 kezel\xE9s ut\xE1n":"After first treatment","Az els\u0151 mosd\xF3l\xE1togat\xE1s a kezel\xE9s ut\xE1n megijeszt\u0151 lehet: a vizelet narancsv\xF6r\xF6s sz\xEDn\u0171. Ez NEM v\xE9r, hanem egyszer\u0171en a gy\xF3gyszer piros sz\xEDne, ami \xEDgy \xFCr\xFCl ki a szervezetb\u0151l.":"The first bathroom visit after treatment can be alarming: the urine is orange-red. This is NOT blood, but simply the drug's red color being excreted from the body.","Az el\u0151medik\xE1ci\xF3 (amit a kezel\xE9s el\u0151tt kap) jelent\u0151sen cs\xF6kkenti az allergia es\xE9ly\xE9t. Az els\u0151 inf\xFAzi\xF3t ez\xE9rt mindig lassan adj\xE1k, \xE9s a n\u0151v\xE9rek fokozottan figyelik \xD6nt.":"Pre-medication (given before treatment) significantly reduces the chance of allergy. That's why the first infusion is always given slowly, and nurses monitor you closely.","Az el\u0151medik\xE1ci\xF3 ez\xE9rt fontos \u2013 soha ne hagyja ki!":"Pre-medication is important \u2014 never skip it!","Az inf\xFAzi\xF3 K\xD6ZBEN vagy k\xF6zvetlen\xFCl ut\xE1na":"DURING or immediately after infusion","Az orvos \xE1ltal javasolt hasmen\xE9s elleni gy\xF3gyszert vegye be m\xE1r az els\u0151 t\xFCnetekn\xE9l!":"Take anti-diarrheal medication recommended by your doctor at the FIRST symptoms!","Az orvosa \xE1ltal javasolt f\xE1jdalomcsillap\xEDt\xF3 seg\xEDthet":"Pain relievers recommended by your doctor can help","Az orvosi csapat rendszeresen ellen\u0151rzi a hall\xE1st":"Your medical team will regularly check your hearing","B6-vitamin (piridoxin) \u2013 k\xE9rdezze meg orvos\xE1t, egyes ir\xE1nyelvek javasolj\xE1k k\xE9z-l\xE1b szindr\xF3m\xE1n\xE1l":"Vitamin B6 (pyridoxine) \u2014 ask your doctor, some guidelines recommend it for hand-foot syndrome","BRAT-di\xE9ta seg\xEDt: ban\xE1n, rizs, alma, pir\xEDt\xF3s":"BRAT diet helps: bananas, rice, applesauce, toast","Bokaduzzadatn\xE1l: l\xE1bfelpolcol\xE1s, mozg\xE1s":"For ankle swelling: elevate legs, keep moving","B\xE1rmilyen altat\xE1sos m\u0171t\xE9t el\u0151tt MINDIG jelezze, hogy kapott Bleomycint \u2013 az aneszteziol\xF3gusnak tudnia kell!":"Before ANY surgery under general anesthesia, ALWAYS tell them you received Bleomycin \u2014 the anesthesiologist MUST know!","B\xE1rmilyen fert\u0151z\xE9s-gyan\xFA eset\xE9n AZONNAL forduljon orvoshoz":"For any suspicion of infection, contact your doctor IMMEDIATELY","B\xE1rmilyen l\xE1z eset\xE9n ne v\xE1rjon, forduljon orvoshoz":"For any fever, don't wait \u2014 contact your doctor",B\u0151relv\u00E1ltoz\u00E1sok:"Skin changes","B\u0151rhydrat\xE1l\xE1s karbamidos kr\xE9mmel naponta":"Skin hydration with urea cream daily","B\u0151rki\xFCt\xE9s, \xF6d\xE9ma":"Skin rash, edema","B\u0151rs\xF6t\xE9ted\xE9s, h\xE1ml\xE1s, megvastagod\xE1s el\u0151fordulhat, k\xFCl\xF6n\xF6sen a nyom\xE1snak kitett ter\xFCleteken.":"Skin darkening, peeling, thickening may occur, especially in pressure areas.","B\u0151s\xE9ges folyad\xE9kp\xF3tl\xE1s, rehidrat\xE1l\xF3 por":"Plenty of rehydration fluids","Cinkoxidos v\xE9d\u0151kr\xE9m az an\xE1lis ter\xFClet v\xE9delm\xE9re":"Zinc oxide barrier cream to protect the anal area","Csontvel\u0151-szuppresszi\xF3":"Bone marrow suppression","C\xE9lzott ter\xE1pia (nem klasszikus kemoter\xE1pia)":"Targeted therapy (not classical chemotherapy)","D-vitamin szintet \xE9rdemes ellen\u0151riztetni \u2013 a norm\xE1lis szint seg\xEDti az immunrendszert":"Vitamin D levels are worth checking \u2014 normal levels support the immune system","DPD-enzim vizsg\xE1lat az ELS\u0150 kezel\xE9s EL\u0150TT K\xD6TELEZ\u0150 \u2013 orvosa el fogja v\xE9gezni":"DPD enzyme test BEFORE the FIRST treatment is MANDATORY \u2014 your doctor will arrange it","DPD-enzimhi\xE1ny kock\xE1zata":"DPD enzyme deficiency risk","Doh\xE1nyz\xE1s TILOS \u2013 t\xF6bbsz\xF6r\xF6sen fokozza a t\xFCd\u0151k\xE1rosod\xE1s kock\xE1zat\xE1t":"Smoking is PROHIBITED \u2014 greatly increases lung damage risk","Enyhe b\u0151rki\xFCt\xE9s, duzzad\xE1s (k\xFCl\xF6n\xF6sen a bok\xE1k k\xF6r\xFCl) el\u0151fordulhat.":"Mild skin rash and swelling (especially around ankles) may occur.","Enyhe k\xE9z- \xE9s l\xE1bmassz\xE1zs seg\xEDtheti a v\xE9rkering\xE9st":"Gentle hand and foot massage may improve circulation","Enyhe l\xE1z, izomf\xE1jdalom, f\xE1radts\xE1g \u2013 mintha influenz\xE1s lenne. \xC1ltal\xE1ban 1\u20132 nap alatt elm\xFAlik.":"Mild fever, muscle pain, fatigue \u2014 as if you had the flu. Usually resolves within 1-2 days.","Ez NEM allergia \xE9s NEM ok a kezel\xE9s le\xE1ll\xEDt\xE1s\xE1ra":"This is NOT allergy and NOT a reason to stop treatment","Ez NEM val\xF3di hasmen\xE9s, hanem a szer k\xF6zvetlen farmakol\xF3giai hat\xE1sa az idegrendszeren. Hirtelen hasmen\xE9ssel, izzad\xE1ssal, ny\xE1lfoly\xE1ssal, k\xF6nnyez\xE9ssel, hasi g\xF6rcs\xF6kkel j\xE1rhat. Atropin-injekci\xF3val AZONNAL kezelhet\u0151!":"This is NOT true diarrhea but the drug's direct pharmacological effect on the nervous system. It may present with sudden diarrhea, sweating, salivation, tearing, and cramps. IMMEDIATELY treatable with Atropine!","Ez a val\xF3di hasmen\xE9s, amely a b\xE9lny\xE1lkah\xE1rtya k\xE1rosod\xE1s\xE1b\xF3l ered. Loperamiddal (Imodium) kezelend\u0151 \u2013 a korai Atropinnal kezelt t\xEDpust\xF3l ELT\xC9R\u0150EN!":"This is the actual diarrhea from intestinal lining damage. Treat with Loperamide (Imodium) \u2014 DIFFERENTLY from the early type treated with Atropine!","Ez tal\xE1n a leggyakoribb panasz. Sokan \xFAgy \xE9rzik a szteroid napj\xE1n, mintha t\xEDz k\xE1v\xE9t ittak volna egyszerre. Fontos: ez \xC1TMENETI hat\xE1s, \xE9s vannak bev\xE1lt m\xF3dszerek ellene.":"This is perhaps the most common complaint. Many people feel on steroid day as if they'd had ten coffees at once. Important: this is a TEMPORARY effect, and there are proven methods to manage it.","Ezek a gy\xF3gyszerek er\u0151sebb h\xE1nyingert okozhatnak, de a j\xF3 h\xEDr az, hogy ma m\xE1r kiv\xE1l\xF3 h\xE1ny\xE1scsillap\xEDt\xF3k \xE1llnak rendelkez\xE9sre. Orvosa t\xF6bbf\xE9le gy\xF3gyszert fog adni a h\xE1nyinger megel\u0151z\xE9s\xE9re \u2013 fontos, hogy ezeket v\xE9gig szedje a javasolt ideig!":"These drugs can cause stronger nausea, but the good news is that excellent anti-nausea medications are now available. Your doctor will prescribe several drugs to prevent nausea \u2014 it's important to take them for the full recommended duration!","Ezek a szerek a r\xE1kos sejtek \xE9p\xEDt\u0151anyagaihoz hasonl\xEDtanak, de hib\xE1sak, \xEDgy megakad\xE1lyozz\xE1k a szaporod\xE1st. A b\xE9l \xE9s sz\xE1jny\xE1lkah\xE1rtya sejtjeit is \xE9rinthetik.":"These drugs resemble the building blocks of cancer cells but are faulty, preventing multiplication. They can also affect gut and mouth lining cells.",Feh\u00E9rjevizel\u00E9s:"Proteinuria (protein in urine)","Fejb\u0151r\xE1pol\xF3 olaj vagy aloe vera g\xE9l enyh\xEDtheti a fejb\u0151r irrit\xE1ci\xF3j\xE1t":"Scalp care oil or aloe vera gel can relieve scalp irritation","Fejh\u0171t\xE9s (scalp cooling) \u2013 k\xE9rdezze meg orvos\xE1t, tax\xE1nokn\xE1l jobb hat\xE9konys\xE1ggal m\u0171k\xF6dik":"Scalp cooling \u2014 ask your doctor, it works better with taxanes","Fert\u0151z\xE9sekre val\xF3 fog\xE9konys\xE1g":"Increased infection susceptibility","Fog\xE1szati beavatkoz\xE1s el\u0151tt jelezze, hogy Bevacizumabot kap!":"Before dental procedures, tell them you're receiving Bevacizumab!","Fokozatosan er\u0151s\xF6d\u0151":"Gradually worsening","Fokozatosan halmoz\xF3d\xF3, d\xF3zisf\xFCgg\u0151":"Gradually accumulating, dose-dependent","F\xE1jdalomcsillap\xEDt\xF3 (Paracetamol) seg\xEDt":"Pain relief (Paracetamol/Acetaminophen) helps","F\u0151k\xE9nt az ELS\u0150 bead\xE1skor":"Mainly during the FIRST administration","F\u0151k\xE9nt az els\u0151 kezel\xE9sekn\xE9l":"Mainly during first treatments","G-CSF injekci\xF3 sz\xFCks\xE9ges lehet":"G-CSF injection may be needed",Gyomorpanaszok:"Stomach issues",Gy\u00F3gy\u00EDt\u00E1s:"Cure","Gy\xF6mb\xE9res tea vagy gy\xF6mb\xE9rkapszula \u2013 term\xE9szetes h\xE1nyingercsillap\xEDt\xF3 kieg\xE9sz\xEDt\xE9s":"Ginger tea or ginger capsules \u2014 natural anti-nausea supplement","Ha Oxaliplatint kap, az egyik legjellemz\u0151bb t\xFCnet a hideg\xE9rz\xE9kenys\xE9g. Hideg t\xE1rgyak \xE9rint\xE9se vagy hideg ital iv\xE1sa \xE9lesebb f\xE1jdalmat, bizserg\xE9st, ak\xE1r torokg\xF6rcs\xF6t is okozhat. Ez nem allergia, hanem idegi hat\xE1s.":"If you receive Oxaliplatin, cold sensitivity is one of the most characteristic symptoms. Touching cold objects or drinking cold beverages can cause sharp pain, tingling, or even throat spasms. This is not allergy but a nerve effect.","Ha a duzzad\xE1s tart\xF3s vagy l\xE9gszomjjal j\xE1r: jelezze orvos\xE1nak!":"If swelling is persistent or accompanied by breathlessness: tell your doctor!","Ha a gy\xF3gyszer kil\xE9p az \xE9rb\u0151l a k\xF6rnyez\u0151 sz\xF6vetbe, s\xFAlyos k\xE1rosod\xE1st okozhat. Ez\xE9rt aj\xE1nlott be\xFCltetett kan\xFCl (Port-a-cath) alkalmaz\xE1sa.":"If the drug leaks from the vein into surrounding tissue, it can cause severe damage. That's why an implanted port (Port-a-cath) is recommended.","Ha a kan\xFCl k\xF6rny\xE9k\xE9n b\xE1rmilyen f\xE1jdalmat, \xE9g\u0151 \xE9rz\xE9st vagy duzzad\xE1st \xE9rez, AZONNAL sz\xF3ljon!":"If you feel ANY pain, burning, or swelling around the cannula, TELL the nurse IMMEDIATELY!","Ha a l\xE1z 38 \xB0C felett van vagy m\xE1snapra is tart: jelezze orvos\xE1nak, mert akkor el kell k\xFCl\xF6n\xEDteni a fert\u0151z\xE9ses l\xE1zt\xF3l":"If fever is above 38\xB0C (100.4\xB0F) or persists the next day: tell your doctor, as infection-related fever needs to be ruled out","Ha a l\xE1z 38 \xB0C felett: az fert\u0151z\xE9s is lehet \u2013 jelezze orvos\xE1nak!":"If fever above 38\xB0C (100.4\xB0F): it could be infection \u2014 tell your doctor!","Ha a v\xE9rnyom\xE1s tart\xF3san 140/90 felett: jelezze orvos\xE1nak!":"If blood pressure is persistently above 140/90: tell your doctor!","Ha az inf\xFAzi\xF3 k\xF6zben hirtelen hasmen\xE9st, izzad\xE1st, hasi g\xF6rcs\xF6t \xE9rez: AZONNAL sz\xF3ljon a n\u0151v\xE9rnek!":"If you experience sudden diarrhea, sweating, or cramps during infusion: IMMEDIATELY tell the nurse!","Ha b\xE1rmilyen okb\xF3l nem t\xF6rt\xE9nt meg, K\xC9RJE orvos\xE1t\xF3l!":"If for any reason it hasn't been done, ASK your doctor!","Ha b\xE1rmit \xE9rez (viszket\xE9s, h\u0151hull\xE1m, szorong\xE1s, neh\xE9zl\xE9gz\xE9s) \u2013 AZONNAL jelezze!":"If you feel anything (itching, hot flash, anxiety, difficulty breathing) \u2014 report IMMEDIATELY!","Ha b\xE1rmit \xE9rez (viszket\xE9s, neh\xE9zl\xE9gz\xE9s, sz\xE9d\xFCl\xE9s) \u2013 jelezze azonnal, a csapat felk\xE9sz\xFClt":"If you feel anything (itching, difficulty breathing, dizziness) \u2014 report immediately, the team is prepared","Ha er\u0151s gyomorf\xE1j\xE1sa van vagy fekete sz\xE9kletet \xE9szlel, AZONNAL forduljon orvoshoz":"If you have severe stomach pain or notice black stool, contact your doctor IMMEDIATELY","Ha habos vizeletet \xE9szlel: jelezze orvos\xE1nak":"If you notice foamy urine: tell your doctor","Ha hirtelen, er\u0151s duzzad\xE1st \xE9szlel (f\u0151leg a l\xE1bain), jelezze orvos\xE1nak":"If you notice sudden severe swelling (especially in your legs), tell your doctor","Ha h\xE1mlani kezd vagy felny\xEDlik a b\u0151r: sz\xF3ljon orvos\xE1nak \u2013 adagcs\xF6kkent\xE9s sz\xFCks\xE9ges lehet":"If peeling starts or skin breaks open: tell your doctor \u2014 dose reduction may be needed","Ha mellkasi f\xE1jdalmat, szapor\xE1bb sz\xEDvver\xE9st, l\xE1bduzzad\xE1st vagy szokatlan fullad\xE1st \xE9rez, AZONNAL jelezze!":"If you experience chest pain, rapid heartbeat, leg swelling, or unusual breathlessness, report IMMEDIATELY!","Ha m\xE1r szed v\xE9rnyom\xE1scs\xF6kkent\u0151t: az adagja m\xF3dos\xEDt\xE1st ig\xE9nyelhet":"If you already take blood pressure medication: your dose may need adjustment","Ha nagyon er\u0151s vagy elh\xFAz\xF3d\xF3, besz\xE9ljen kezel\u0151orvos\xE1val":"If very severe or prolonged, speak with your doctor","Ha napi 6\xD7 vagy t\xF6bbsz\xF6r, vagy 24 \xF3r\xE1n\xE1l tov\xE1bb tart: AZONNAL orvoshoz!":"If 6+ times daily or lasting more than 24 hours: see a doctor IMMEDIATELY!","Ha napi hatszor vagy t\xF6bbsz\xF6r hasmen\xE9se van, vagy v\xE9r van a sz\xE9kletben: AZONNAL orvoshoz!":"If diarrhea occurs six or more times daily, or there's blood in stool: see a doctor IMMEDIATELY!","Ha napokkal k\xE9s\u0151bb is tart, vagy f\xE1jdalom k\xEDs\xE9ri, sz\xF3ljon kezel\u0151orvos\xE1nak":"If it persists days later or is accompanied by pain, tell your doctor","Ha nem tud enni vagy inni a f\xE1jdalom miatt, felt\xE9tlen\xFCl jelezze \u2013 f\xE1jdalomcsillap\xEDt\xF3 sz\xE1jg\xE9l \xE9s speci\xE1lis t\xE1pszerek is l\xE9teznek!":"If you can't eat or drink due to pain, definitely report it \u2014 pain-relieving mouth gel and special nutrition products exist!","Ha szeretn\xE9, k\xE9rjen pszichol\xF3giai t\xE1mogat\xE1st \u2013 teljesen norm\xE1lis, ha ez nehezen viselhet\u0151":"If you'd like, ask for psychological support \u2014 it's completely normal if this is hard to bear","Ha szomjasabb a megszokottn\xE1l \xE9s t\xF6bbsz\xF6r kell mosd\xF3ba mennie, jelezze orvos\xE1nak":"If you're thirstier than usual and need the bathroom more often, tell your doctor","Ha tart\xF3s lehangolts\xE1got vagy szorong\xE1st \xE9rez, felt\xE9tlen\xFCl jelezze orvos\xE1nak":"If you experience persistent low mood or anxiety, definitely tell your doctor","Ha t\xF6bb \xE9jszaka sem tud aludni, sz\xF3ljon orvos\xE1nak \u2013 l\xE9teznek biztons\xE1gos megold\xE1sok":"If you can't sleep for several nights, tell your doctor \u2014 safe solutions exist","Ha v\xE9rk\xF6h\xF6g\xE9st, v\xE9rsz\xE9kletet, v\xE9res vizeletet vagy hirtelen er\u0151s fejf\xE1j\xE1st \xE9szlel: AZONNAL orvoshoz!":"If you notice blood in cough, stool, urine, or sudden severe headache: see a doctor IMMEDIATELY!","Ha \xD6n cukorbeteg, mindenk\xE9ppen besz\xE9ljen orvos\xE1val, mert a gy\xF3gyszerek m\xF3dos\xEDt\xE1sa sz\xFCks\xE9ges lehet":"If you're diabetic, definitely speak with your doctor as medication adjustments may be needed","Hall\xE1scs\xF6kken\xE9s (Cisplatin)":"Hearing loss (Cisplatin)","Halmoz\xF3d\xF3 \u2013 a ciklusok sor\xE1n n\u0151 a kock\xE1zat":"Accumulating \u2014 risk increases with cycles",Hangulatingadoz\u00E1s:"Mood swings",Hasmen\u00E9s:"Diarrhea","Haszn\xE1ljon puha fogkef\xE9t \xE9s alkoholmentes sz\xE1jvizet (pl. Biotene)":"Use a soft toothbrush and alcohol-free mouthwash (e.g., Biotene)","Hideg id\u0151ben viseljen s\xE1lat \xE9s keszty\u0171t \u2013 m\xE9g \xE1tmeneti \xE9vszakokban is!":"Wear a scarf and gloves in cold weather \u2014 even in transitional seasons!","Hidegr\xE1z\xE1s eset\xE9n takar\xF3t kap \xE9s f\xE1jdalomcsillap\xEDt\xF3t \u2013 ez \xE1ltal\xE1ban gyorsan seg\xEDt":"If you get chills, you'll receive a blanket and pain reliever \u2014 this usually helps quickly","Hideg\xE9rz\xE9kenys\xE9g (Oxaliplatin)":"Cold sensitivity (Oxaliplatin)","Hidrat\xE1l\xF3 kr\xE9m a b\u0151rki\xFCt\xE9sre":"Moisturizing cream for skin rash","Hirtelen, nagyon magas v\xE9rnyom\xE1s (180/120 felett), fejf\xE1j\xE1ssal: S\xDCRG\u0150S!":"Sudden very high blood pressure (above 180/120) with headache: URGENT!","Hosszabb szteroid-szed\xE9s eset\xE9n az arc kerekebb, puffadtabb v\xE1lhat. Ez nem h\xEDz\xE1s, hanem folyad\xE9kvisszatart\xE1s, \xE9s a k\xFAra v\xE9gezt\xE9vel fokozatosan vissza\xE1ll az eredeti \xE1llapot.":"With longer steroid use, the face may become rounder and puffier. This is not weight gain but fluid retention, and gradually returns to normal after the course.","H\xE1nyinger \xE9s h\xE1ny\xE1s":"Nausea and vomiting","H\xF3napokig a kezel\xE9s ut\xE1n is!":"For months after treatment too!","Igyon b\u0151ven vizet, te\xE1t, h\xFAslevest \u2013 elektrolit-p\xF3tl\xF3 italok k\xFCl\xF6n\xF6sen aj\xE1nlottak":"Drink plenty of water, tea, broth \u2014 electrolyte drinks are especially recommended","Influenzaszer\u0171 t\xFCnetek":"Flu-like symptoms","Inf\xFAzi\xF3s reakci\xF3":"Infusion reaction","Javasoljuk, hogy m\xE1r a kezel\xE9s el\u0151tt szerezzen be par\xF3k\xE1t vagy fejfed\u0151ket \u2013 a par\xF3ka TB-t\xE1mogatott!":"We suggest getting a wig or head coverings before treatment \u2014 wigs may be insurance-covered!","Jelezze fogorvos\xE1nak \xE9s b\xE1rmely m\xE1s orvos\xE1nak, hogy ezt a kezel\xE9st kapja/kapta":"Inform your dentist and any other doctor that you are/were receiving this treatment","Jelezze orvos\xE1nak, ha b\u0151rh\xF3lyagok, kifek\xE9lyesed\xE9s jelentkezik":"Report to your doctor if blisters or ulceration appear","J\xE9gkocka szopogat\xE1sa az inf\xFAzi\xF3 alatt (or\xE1lis krioteri\xE1pia) \u2013 cs\xF6kkenti a sz\xE1jsebek kialakul\xE1s\xE1nak es\xE9ly\xE9t":"Ice chips during infusion (oral cryotherapy) \u2014 reduces the chance of mouth sores","Karbamidos (urea) kr\xE9m haszn\xE1lata naponta t\xF6bbsz\xF6r \u2013 legal\xE1bb 10%-os koncentr\xE1ci\xF3j\xFA":"Use urea cream several times daily \u2014 at least 10% concentration","Kemoter\xE1pi\xE1s szer":"Chemotherapy drug","Kemoter\xE1pi\xE1s szer (antibiotikum-jelleg\u0171)":"Chemotherapy drug (antibiotic-type)","Kemoter\xE1pi\xE1s szer (antimetabolit)":"Chemotherapy drug (antimetabolite)","Kemoter\xE1pi\xE1s szer (topoizomer\xE1z-g\xE1tl\xF3)":"Chemotherapy drug (topoisomerase inhibitor)","Ker\xFClje a f\u0171szeres, savany\xFA, nagyon forr\xF3 \xE9teleket":"Avoid spicy, acidic, very hot foods","Ker\xFClje a hangos zajt \xE9s a f\xFClhallgat\xF3 nagy hangerej\u0171 haszn\xE1lat\xE1t":"Avoid loud noise and high headphone volume","Ker\xFClje a koffeint d\xE9lut\xE1n":"Avoid caffeine in the afternoon","Ker\xFClje a t\xF6megk\xF6zleked\xE9st \xE9s a beteg embereket szteroid-napokon":"Avoid public transport and sick people on steroid days","Kieg\xE9sz\xEDt\u0151 gy\xF3gyszer":"Supportive medication","Kisebb s\xE9r\xFCl\xE9sek, sebek lassabban gy\xF3gyulnak":"Minor injuries and wounds heal more slowly","Koenzim Q10 (CoQ10) \u2013 egyes tanulm\xE1nyok szerint v\xE9d\u0151hat\xE1s\xFA lehet a sz\xEDvizomra kemoter\xE1pia sor\xE1n (k\xE9rdezze meg orvos\xE1t!)":"Coenzyme Q10 (CoQ10) \u2014 some studies suggest it may protect heart muscle during chemotherapy (ask your doctor!)","Korai hasmen\xE9s (kolinerg szindr\xF3ma)":"Early diarrhea (cholinergic syndrome)","Korai jelz\xE9skor a kezel\xE9s m\xF3dos\xEDt\xE1sa meg\xE1ll\xEDthatja a roml\xE1st":"With early reporting, treatment modification can halt deterioration","K\xE9nyelmes, cs\xFAsz\xE1smentes cip\u0151 \u2013 a zsibbadt talp n\xF6veli a botl\xE1svesz\xE9lyt":"Comfortable non-slip shoes \u2014 numb soles increase tripping risk","K\xE9rj\xFCk, jelezze az ELS\u0150 f\xFClz\xFAg\xE1st vagy hall\xE1sv\xE1ltoz\xE1st!":"Please report the FIRST tinnitus or hearing change!","K\xE9rj\xFCk, jelezze m\xE1r az ELS\u0150 t\xFCneteket orvos\xE1nak \u2013 ilyenkor m\xE9g sokat lehet tenni!":"Please report even the FIRST symptoms to your doctor \u2014 much can still be done at this stage!","K\xE9sz\xEDtsen el\u0151 eg\xE9szs\xE9ges nassolnival\xF3kat (gy\xFCm\xF6lcs, z\xF6lds\xE9g, di\xF3f\xE9l\xE9k)":"Prepare healthy snacks (fruit, vegetables, nuts)","K\xE9sz\xEDtsen keszty\u0171t a h\u0171t\u0151szekr\xE9ny haszn\xE1lat\xE1hoz":"Keep gloves ready for using the refrigerator","K\xE9s\u0151i hasmen\xE9s":"Late diarrhea","K\xE9z-l\xE1b szindr\xF3ma":"Hand-foot syndrome","K\xE9zfert\u0151tlen\xEDt\u0151 mindig legyen \xD6nn\xE9l":"Always keep hand sanitizer with you","K\xE9zfert\u0151tlen\xEDt\u0151t tartson mag\xE1n\xE1l":"Keep hand sanitizer with you","K\xF6rm\xF6k megvastagodhatnak, s\xF6t\xE9tedhetnek \u2013 \xE1tmeneti":"Nails may thicken and darken \u2014 temporary","L-glutamin por \u2013 egyes tanulm\xE1nyok szerint cs\xF6kkentheti a neurop\xE1tia s\xFAlyoss\xE1g\xE1t (k\xE9rdezze meg orvos\xE1t!)":"L-glutamine powder \u2014 some studies suggest it may reduce neuropathy severity (ask your doctor!)","Lefekv\xE9s el\u0151tt pr\xF3b\xE1ljon relax\xE1ci\xF3s technik\xE1t (lass\xFA l\xE9gz\xE9s, kellemes zene)":"Try relaxation techniques before bed (slow breathing, calming music)","Loperamid (Imodium) az orvos s\xE9m\xE1ja szerint \u2013 \xE1ltal\xE1ban minden hasmen\xE9ses sz\xE9klet ut\xE1n!":"Loperamide (Imodium) per your doctor's protocol \u2014 typically after every diarrheal stool!","L\xE1z 38 \xB0C felett: AZONNAL orvoshoz!":"Fever above 38\xB0C (100.4\xB0F): see a doctor IMMEDIATELY!","L\xE1z a bead\xE1s ut\xE1n":"Fever after administration","MINDIG \xE9tkez\xE9s UT\xC1N vegye be a szteroidot!":"ALWAYS take steroids AFTER meals!","Magas hegyi t\xFAra (>3000m) ker\xFClend\u0151 \u2013 a ritka leveg\u0151 megterhel\u0151 lehet a t\xFCd\u0151nek":"High altitude hiking (>3000m) should be avoided \u2014 thin air can strain the lungs","Magas v\xE9rnyom\xE1s":"High blood pressure","Magn\xE9zium-p\xF3tl\xE1s seg\xEDthet az izomg\xF6rcs\xF6k ellen (k\xE9rdezze meg orvos\xE1t!)":"Magnesium supplementation may help with muscle cramps (ask your doctor!)","Megn\xF6vekedett \xE9tv\xE1gy":"Increased appetite","Meleg f\xFCrd\u0151, enyhe ny\xFAjt\xE1s, s\xE9ta enyh\xEDtheti":"Warm bath, gentle stretching, walking may provide relief","Meleg keszty\u0171 \xE9s zokni seg\xEDthet a t\xFCnetek enyh\xEDt\xE9s\xE9ben":"Warm gloves and socks may help relieve symptoms","M\xE9g ha \xFAgy is \xE9rzi, nincs l\xE1za, rossz k\xF6z\xE9rzet eset\xE9n m\xE9rje meg a h\u0151m\xE9rs\xE9klet\xE9t!":"Even if you feel fine, measure your temperature if you feel unwell!","M\u0171t\xE9t el\u0151tt legal\xE1bb 4\u20136 h\xE9ttel le kell \xE1ll\xEDtani \u2013 orvosa tervezi!":"Must be stopped at least 4-6 weeks before surgery \u2014 your doctor plans this!","M\u0171t\xE9t el\u0151tti kezel\xE9s (neoadjuv\xE1ns)":"Before surgery (neoadjuvant)","M\u0171t\xE9t ut\xE1ni kezel\xE9s (adjuv\xE1ns)":"After surgery (adjuvant)","Narancsv\xF6r\xF6s vizelet":"Orange-red urine","Ne feledje: \xC1TMENETI, a szteroid sz\xFCnetel\xE9skor elm\xFAlik":"Remember: TEMPORARY \u2014 it passes when the steroid is paused","Ne legyen b\u0171ntudata \u2013 a szteroid csin\xE1lja, nem \xD6n!":"Don't feel guilty \u2014 the steroid is doing this, not you!","Nyugtalans\xE1g, ingerl\xE9kenys\xE9g, hirtelen s\xEDr\xE1s \u2013 ezek mind a gy\xF3gyszer hat\xE1sai, \xE9s egy\xE1ltal\xE1n nem az \xD6n hib\xE1ja. Sok beteg \xE9rzi \xFAgy, hogy a szteroid-napokon nem \xF6nmaga. Ez a szteroid sz\xFCnetel\xE9skor elm\xFAlik.":"Restlessness, irritability, sudden crying \u2014 these are all drug effects, not your fault at all. Many patients feel unlike themselves on steroid days. This passes when the steroid is paused.","Orrv\xE9rz\xE9s, \xEDnyv\xE9rz\xE9s gyakoribb lehet":"Nosebleeds and gum bleeding may be more common","Otthoni v\xE9rnyom\xE1sm\xE9r\xE9s javasolt \u2013 vezessen napl\xF3t!":"Home blood pressure monitoring recommended \u2014 keep a log!","Paracetamol seg\xEDt a l\xE1z \xE9s f\xE1jdalom ellen":"Paracetamol/Acetaminophen helps with fever and pain","Perif\xE9ri\xE1s neurop\xE1tia (zsibbad\xE1s)":"Peripheral neuropathy (numbness)","Pihen\xE9s \xE9s b\u0151s\xE9ges folyad\xE9kbevitel":"Rest and plenty of fluids","Probiotikum (pl. Saccharomyces boulardii) \u2013 k\xE9rdezze meg orvos\xE1t, t\xF6bb tanulm\xE1ny t\xE1mogatja a kemoter\xE1pi\xE1s hasmen\xE9s cs\xF6kkent\xE9s\xE9ben":"Probiotics (e.g., Saccharomyces boulardii) \u2014 ask your doctor, several studies support their use in chemo-related diarrhea","Probiotikum seg\xEDthet \u2013 k\xE9rdezze meg orvos\xE1t":"Probiotics may help \u2014 ask your doctor","Pr\xF3b\xE1ljon kevesebb s\xF3t fogyasztani":"Try to reduce salt intake","Pr\xF3b\xE1ljon kis adagokban, gyakran enni":"Try to eat small amounts frequently","Rendszeres t\xFCd\u0151funkci\xF3s vizsg\xE1lat (spirometria) a kezel\xE9s alatt":"Regular lung function tests (spirometry) during treatment","Rendszeresen mosson kezet":"Wash your hands regularly","SPF-es fejb\u0151rv\xE9d\u0151 vagy sapka a napon \u2013 a kopasz fejb\u0151r nagyon nap\xE9rz\xE9keny!":"SPF scalp protection or hat in the sun \u2014 bare scalp is very sun-sensitive!","Sebgy\xF3gyul\xE1si zavar":"Wound healing impairment","Shea vajas vagy lanolinos k\xE9zkr\xE9m \xE9jszak\xE1ra, pamut keszty\u0171ben":"Shea butter or lanolin hand cream at night, in cotton gloves","Sokan tapasztalj\xE1k, hogy a szteroid napjain szinte csillap\xEDthatatlan \xE9tv\xE1gyuk van. Ez a gy\xF3gyszer hat\xE1sa, NEM az \xD6n hib\xE1ja, \xE9s NEM jellembeli gyenges\xE9g. A k\xFAra v\xE9gezt\xE9vel az \xE9tv\xE1gy visszat\xE9r a megszokott szintre.":"Many people experience almost insatiable appetite on steroid days. This is the drug's effect, NOT your fault. After the course ends, appetite returns to normal.","Szat\xE9n p\xE1rnahuzat cs\xF6kkenti a fejb\u0151r d\xF6rzs\xF6l\xE9s\xE9t alv\xE1s k\xF6zben":"Satin pillowcase reduces scalp friction during sleep","Szobah\u0151m\xE9rs\xE9klet\u0171 vizet tartson az \xE1gy mellett is":"Keep room-temperature water by your bedside too","Szobah\u0151m\xE9rs\xE9klet\u0171, enyhe \xEDz\u0171 \xE9telek jobban toler\xE1lhat\xF3k":"Room-temperature, bland foods may be easier to tolerate","Szokatlan v\xE9rz\xE9s, v\xE9ral\xE1fut\xE1s: jelezze!":"Unusual bleeding, bruising: report it!","Szteroid-napokon ker\xFClje az er\u0151sen cukros \xE9teleket, italokat":"On steroid days, avoid very sugary foods and drinks","Sz\xE1jbalzsam, ajak\xE1pol\xF3 \u2013 a sz\xE1raz, repedezett ajkak kapuk\xE9nt szolg\xE1lnak a fert\u0151z\xE9seknek":"Lip balm \u2014 dry, cracked lips serve as gateways for infection","Sz\xE1jny\xE1lkah\xE1rtya-gyullad\xE1s":"Oral mucositis","Sz\xE1raz k\xF6h\xF6g\xE9s vagy neh\xE9zl\xE9gz\xE9s terhel\xE9sre: AZONNAL jelezze orvos\xE1nak!":"Dry cough or breathlessness on exertion: report to your doctor IMMEDIATELY!",Sz\u00EDvk\u00E1rosod\u00E1s:"Heart damage","Sz\xEDv\xF3sz\xE1lat haszn\xE1ljon \u2013 az ajkak k\xFCl\xF6n\xF6sen \xE9rz\xE9kenyek lehetnek":"Use a straw \u2014 lips can be especially sensitive","Sz\xF3dabikarb\xF3n\xE1s vizes \xF6bl\xEDt\xE9s naponta t\xF6bbsz\xF6r seg\xEDt a megel\u0151z\xE9sben (1 te\xE1skan\xE1l 2,5 dl langyos v\xEDzben)":"Baking soda mouth rinse several times daily helps prevention (1 teaspoon in 250ml warm water)","Sz\xF3ljon a csal\xE1dj\xE1nak, hogy ezeken a napokon egy kicsit m\xE1s lehet a hangulata \u2013 \xEDgy \u0151k is felk\xE9sz\xFClhetnek":"Tell your family your mood may be different on these days \u2014 so they can be prepared too","Sz\xF6vetelhal\xE1s kan\xFCl k\xF6r\xFCl (extravaz\xE1ci\xF3)":"Tissue damage around cannula (extravasation)","S\xE9t\xE1ljon, pr\xF3b\xE1ljon m\xE9lyl\xE9gz\xE9st, hallgasson zen\xE9t":"Walk, try deep breathing, listen to music","Tart\xF3s fert\u0151z\xE9sfog\xE9konys\xE1g":"Prolonged infection susceptibility","Teljesen norm\xE1lis, ne ijedjen meg!":"Completely normal, don't be alarmed!","Tengervizes orrspray (pl. Sterimar) seg\xEDt nedvesen tartani az orrny\xE1lkah\xE1rty\xE1t \u2013 term\xE9szetes v\xE9delmi vonal":"Saline nasal spray (e.g., Sterimar) helps keep nasal mucosa moist \u2014 a natural defense barrier","T\xFCd\u0151toxicit\xE1s (Bleomycin-pneumonitis)":"Lung toxicity (Bleomycin pneumonitis)","T\xFCnetcs\xF6kkent\xE9s (palliat\xEDv)":"Symptom relief (palliative)","Val\xF3sz\xEDn\u0171leg meglep\u0151, de a szteroidok szinte minden kemoter\xE1pi\xE1s protokollban szerepelnek. Nem az\xE9rt kapja \u0151ket, mert s\xFAlyosabb a betegs\xE9ge! \xC9ppen ellenkez\u0151leg: kit\u0171n\u0151en megel\u0151zik az allergi\xE1s reakci\xF3kat, cs\xF6kkentik a h\xE1nyingert, \xE9s gyullad\xE1sg\xE1tl\xF3 hat\xE1suk is van. Csak r\xF6vid ideig szedi majd, de m\xE9g \xEDgy is lehetnek \xE1tmeneti mell\xE9khat\xE1saik.":"It may seem surprising, but steroids are part of almost every chemotherapy regimen. You're not getting them because your disease is more serious! Quite the opposite: they excellently prevent allergic reactions, reduce nausea, and have anti-inflammatory effects. You'll only take them briefly, but they can still have temporary side effects.","Vigy\xE1zzon a feh\xE9r ruh\xE1kkal a kezel\xE9s ut\xE1ni napokban":"Be careful with white clothes in the days after treatment","Viseljen k\xE9nyelmes, b\u0151 cip\u0151t \u2013 ker\xFClje a szoros \xE9s kem\xE9ny l\xE1bbeliket":"Wear comfortable, loose shoes \u2014 avoid tight and hard footwear","Vizeletvizsg\xE1lat minden kezel\xE9s el\u0151tt sz\xFCks\xE9ges":"Urine test needed before every treatment","V\xE9ralvad\xE1sg\xE1tl\xF3 szed\xE9se eset\xE9n fokozott figyelem sz\xFCks\xE9ges":"Extra caution needed if taking blood thinners","V\xE9rcukorszint emelked\xE9se":"Blood sugar elevation",V\u00E9rz\u00E9svesz\u00E9ly:"Bleeding risk","\xC1lmatlans\xE1g, felp\xF6rg\xE9s":"Insomnia, feeling wired","\xC9l\u0151 vakcina TILOS a kezel\xE9s alatt \xE9s ut\xE1na h\xF3napokig \u2013 orvosa megmondja, meddig!":"Live vaccines are PROHIBITED during treatment and for months after \u2014 your doctor will tell you how long!","\xCDz\xFCleti \xE9s izomf\xE1jdalom":"Joint and muscle pain"},k={chemoTitle:{hu:"Kemoter\xE1pi\xE1s",en:"Chemotherapy"},chemoSub:{hu:"Betegt\xE1j\xE9koztat\xF3",en:"Patient Guide"},heroText:{hu:"Tudjuk, hogy a kemoter\xE1pia gondolata f\xE9lelmeket kelthet. Ez az oldal az\xE9rt k\xE9sz\xFClt, hogy seg\xEDtsen felk\xE9sz\xFClni, \xE9s \xE9rezze: nem lesz egyed\xFCl.",en:"We know the thought of chemotherapy can be frightening. This page was created to help you prepare and to reassure you: you won't be alone."},introBtn:{hu:"Mi is az a kemoter\xE1pia?",en:"What is chemotherapy?"},selectDiag:{hu:"V\xE1lassza ki a diagn\xF3zis\xE1t",en:"Select your diagnosis"},disclaimer:{hu:"Ez az alkalmaz\xE1s \xE1ltal\xE1nos t\xE1j\xE9koztat\xE1st ny\xFAjt. K\xE9rd\xE9seivel forduljon kezel\u0151orvos\xE1hoz.",en:"This application provides general information. For questions, please consult your doctor."},home:{hu:"\u2190 F\u0151oldal",en:"\u2190 Home"},search:{hu:"\u2315 Keres\xE9s",en:"\u2315 Search"},searchPlh:{hu:"Keressen: pl. h\xE1nyinger, par\xF3ka, f\xE1radts\xE1g...",en:"Search: e.g. nausea, wig, fatigue..."},noResults:{hu:"Nincs tal\xE1lat. Pr\xF3b\xE1ljon m\xE1s kifejez\xE9st.",en:"No results found. Try different keywords."},chemoTreat:{hu:"Kemoter\xE1pi\xE1s kezel\xE9s",en:"Chemotherapy treatment"},yourTreat:{hu:"Az \xD6n kezel\xE9se",en:"Your treatment"},drugsSect:{hu:"A kezel\xE9sben haszn\xE1lt hat\xF3anyagok",en:"Active ingredients in your treatment"},drugHint:{hu:"Az orvos az \xD6n egy\xE9ni helyzete alapj\xE1n v\xE1lasztja ki, melyik hat\xF3anyagokat kapja, milyen kombin\xE1ci\xF3ban \xE9s sorrendben. K\xE9rdezze meg b\xE1tran, pontosan mit kap!",en:"Your doctor selects which drugs you receive based on your individual situation. Don't hesitate to ask exactly what you're getting!"},examsSect:{hu:"Vizsg\xE1latok a kezel\xE9s el\u0151tt",en:"Pre-treatment examinations"},premedSect:{hu:"El\u0151medik\xE1ci\xF3",en:"Pre-medication"},firstTreat:{hu:"Az els\u0151 kemoter\xE1pi\xE1s kezel\xE9s",en:"Your first chemotherapy treatment"},expect:{hu:"Mire sz\xE1m\xEDthat",en:"What to expect"},supervision:{hu:"Orvosi fel\xFCgyelet",en:"Medical supervision"},companion:{hu:"K\xEDs\xE9r\u0151 \xE9s hazajut\xE1s",en:"Companion and getting home"},allergyTitle:{hu:"Allergi\xE1s \xE9s inf\xFAzi\xF3s reakci\xF3k",en:"Allergic and infusion reactions"},allergyIntro:{hu:"A kemoter\xE1pi\xE1s gy\xF3gyszerek egy r\xE9sz\xE9n\xE9l el\u0151fordulhat allergi\xE1s vagy inf\xFAzi\xF3s reakci\xF3. Ez ijeszt\u0151en hangzik, de az orvosi csapat mindig felk\xE9sz\xFClten v\xE1rja ezeket a helyzeteket, \xE9s a legt\xF6bb reakci\xF3 gyorsan, hat\xE9konyan kezelhet\u0151. Az el\u0151medik\xE1ci\xF3 kifejezetten a kock\xE1zat cs\xF6kkent\xE9s\xE9re szolg\xE1l.",en:"Some chemotherapy drugs may cause allergic or infusion reactions. This sounds scary, but the medical team is always prepared, and most reactions can be managed quickly and effectively. Pre-medication is specifically designed to reduce the risk."},whenLabel:{hu:"Mikor:",en:"When:"},sympLabel:{hu:"T\xFCnetek:",en:"Symptoms:"},prevLabel:{hu:"Megel\u0151z\xE9s:",en:"Prevention:"},reactLabel:{hu:"Ha reakci\xF3 t\xF6rt\xE9nik:",en:"If a reaction occurs:"},recOk:{hu:"Aj\xE1nlott, szabad",en:"Recommended"},recNo:{hu:"Ker\xFClend\u0151, tilos",en:"Avoid / Prohibited"},bringTitle:{hu:"Mit hozzon mag\xE1val?",en:"What to bring?"},bringIntro:{hu:"Az al\xE1bbiakat javasoljuk:",en:"We recommend the following:"},treatProcess:{hu:"A kezel\xE9s menete",en:"Treatment process"},warnDuring:{hu:"Ha a kezel\xE9s k\xF6zben b\xE1rmit szokatlant \xE9rez \u2013 kipirul\xE1s, viszket\xE9s, neh\xE9zl\xE9gz\xE9s, mellkasi szor\xEDt\xE1s, sz\xE9d\xFCl\xE9s, hidegr\xE1z\xE1s \u2013 k\xE9rj\xFCk, AZONNAL sz\xF3ljon a n\u0151v\xE9rnek! Ez nem t\xFAlzott \xF3vatoss\xE1g: a szem\xE9lyzet kifejezetten k\xE9ri, hogy jelezzen, \xE9s azonnal tud seg\xEDteni.",en:"If you feel anything unusual during treatment \u2014 flushing, itching, difficulty breathing, chest tightness, dizziness, chills \u2014 please IMMEDIATELY tell the nurse! This is not being overly cautious: the staff specifically asks you to report anything, and can help immediately."},seIntro:{hu:"Az al\xE1bbiakban az egyes hat\xF3anyagokhoz tartoz\xF3 legfontosabb mell\xE9khat\xE1sokat mutatjuk be. Ne ijedjen meg a list\xE1t\xF3l! Nem biztos, hogy mindegyik gy\xF3gyszert kapja, \xE9s ha igen sem biztos, hogy minden mell\xE9khat\xE1s jelentkezik. Minden mell\xE9khat\xE1sn\xE1l felt\xFCntett\xFCk, melyik hat\xF3anyaghoz tartozik \u2013 \xEDgy csak az \xD6nre vonatkoz\xF3kat kell figyelnie.",en:"Below we present the most important side effects associated with each drug. Don't be alarmed by the list! You may not receive all of these drugs, and even if you do, not all side effects will occur. For each side effect, we've indicated which drug it belongs to \u2014 so you only need to focus on what applies to you."},drugLabel:{hu:"Hat\xF3anyag: ",en:"Drug: "},whenOccur:{hu:"Mikor jelentkezhet: ",en:"When it may occur: "},whatToDo:{hu:"Mit tehet:",en:"What you can do:"},genSe:{hu:"\xC1ltal\xE1nos mell\xE9khat\xE1sok",en:"General side effects"},genSeIntro:{hu:"Az al\xE1bbi t\xFCnetek a legt\xF6bb kemoter\xE1pi\xE1s protokolln\xE1l el\u0151fordulhatnak, \xE9s nem k\xF6t\u0151dnek egyetlen konkr\xE9t gy\xF3gyszerhez. Fontos, hogy ismerje \xE9s felismerje \u0151ket.",en:"The following symptoms can occur with most chemotherapy regimens and are not linked to a single specific drug. It's important to know and recognize them."},drugGuide:{hu:"R\xE9szletes gy\xF3gyszerismertet\u0151",en:"Detailed drug guide"},drugGuideIntro:{hu:"Itt az egyes gy\xF3gyszercsoportokr\xF3l tal\xE1l r\xE9szletes inform\xE1ci\xF3t. Kattintson arra, amelyiket szeretn\xE9 megismerni:",en:"Here you'll find detailed information about each drug group. Click on the one you'd like to learn about:"},howWorks:{hu:"Hogyan hat?",en:"How does it work?"},seFx:{hu:"Mell\xE9khat\xE1sai:",en:"Side effects:"},emergency:{hu:"V\xC9SZHELYZET",en:"EMERGENCY"},tipsSelect:{hu:"V\xE1lassza ki az \xD6nt \xE9rdekl\u0151 t\xE9m\xE1t:",en:"Select the topic that interests you:"},disclaimerFull:{hu:"Ez az alkalmaz\xE1s \xE1ltal\xE1nos t\xE1j\xE9koztat\xE1si c\xE9lt szolg\xE1l. Minden beteg egyedi. Ha b\xE1rmi k\xE9rd\xE9se van, forduljon bizalommal kezel\u0151orvos\xE1hoz.",en:"This application is for general information only. Every patient is unique. If you have any questions, please consult your doctor."},questTitle:{hu:"K\xE9rd\xE9sek az orvosomnak",en:"Questions for my doctor"},questIntro:{hu:"Az NCI (Nemzeti R\xE1kint\xE9zet) kutat\xE1sai szerint azok a betegek, akik akt\xEDvan r\xE9szt vesznek a kezel\xE9si d\xF6nt\xE9sekben, jobban alkalmazkodnak \xE9s kev\xE9sb\xE9 szoronganak. \xCDrja ki el\u0151re a k\xE9rd\xE9seit, \xE9s vigye mag\xE1val a vizithez! Nem kell mindet feltennie \u2013 v\xE1lassza ki, amelyek most a legfontosabbak.",en:"According to NCI (National Cancer Institute) research, patients who actively participate in treatment decisions cope better and feel less anxious. Write your questions down ahead of time and bring them to your visit! You don't have to ask all of them \u2014 pick the ones most important to you right now."},distressQ:{hu:"Hogyan \xE9rzi mag\xE1t most?",en:"How are you feeling right now?"},distressLow:{hu:"Semmi megterhel\xE9s",en:"No distress"},distressHigh:{hu:"Elviselhetetlen",en:"Unbearable"},nav:{ov:{hu:"\xC1ttekint\xE9s",en:"Overview"},ft:{hu:"Els\u0151 kezel\xE9s",en:"First treatment"},al:{hu:"Allergia",en:"Allergy"},pr:{hu:"Felk\xE9sz\xFCl\xE9s",en:"Preparation"},ar:{hu:"\xC9rkez\xE9s napja",en:"Treatment day"},du:{hu:"Kezel\xE9s k\xF6zben",en:"During treatment"},af:{hu:"Mell\xE9khat\xE1sok",en:"Side effects"},em:{hu:"V\xE9szhelyzet",en:"Emergency"},dr:{hu:"Gy\xF3gyszerismertet\u0151",en:"Drug guide"},ti:{hu:"Tan\xE1csok",en:"Tips"},le:{hu:"Lelki eg\xE9szs\xE9g",en:"Mental health"},mn:{hu:"Mindennapok",en:"Daily life"},cs:{hu:"
